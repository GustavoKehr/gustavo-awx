---
- name: "Validate supported OS family"
  ansible.builtin.assert:
    that:
      - ansible_os_family in postgres_server_packages
      - ansible_os_family in postgres_service_name
      - ansible_os_family in postgres_config_dir
    fail_msg: "Unsupported OS family for postgres_install: {{ ansible_os_family }}"
  tags: [postgres, postgres_install, postgres_validate]

- name: "Install PostgreSQL server and psycopg2"
  ansible.builtin.package:
    name: "{{ postgres_server_packages[ansible_os_family] }}"
    state: present
  tags: [postgres, postgres_install, postgres_packages]

- name: "Initialize PostgreSQL data directory (RHEL only)"
  ansible.builtin.command:
    cmd: postgresql-setup --initdb
    creates: /var/lib/pgsql/data/PG_VERSION
  when: ansible_os_family == "RedHat"
  tags: [postgres, postgres_install, postgres_init]

- name: "Ensure PostgreSQL service is enabled and started"
  ansible.builtin.service:
    name: "{{ postgres_service_name[ansible_os_family] }}"
    state: started
    enabled: true
  tags: [postgres, postgres_install, postgres_service]

- name: "Allow custom PostgreSQL port in SELinux (RHEL only)"
  community.general.seport:
    ports: "{{ postgres_port }}"
    proto: tcp
    setype: postgresql_port_t
    state: present
  when:
    - ansible_os_family == "RedHat"
    - postgres_port | int != 5432
    - ansible_selinux.status == "enabled"
  tags: [postgres, postgres_install, postgres_hardening, postgres_selinux]

- name: "Configure PostgreSQL parameters in postgresql.conf"
  ansible.builtin.lineinfile:
    path: "{{ postgres_config_dir[ansible_os_family] }}/postgresql.conf"
    regexp: "^#?\\s*{{ item.param }}\\s*="
    line: "{{ item.param }} = {{ item.value }}"
    owner: postgres
    group: postgres
  loop:
    - { param: "listen_addresses", value: "'{{ postgres_bind_address }}'" }
    - { param: "port",             value: "{{ postgres_port }}" }
    - { param: "max_connections",  value: "{{ postgres_max_connections }}" }
    - { param: "shared_buffers",   value: "{{ postgres_shared_buffers }}" }
    - { param: "work_mem",         value: "{{ postgres_work_mem }}" }
    - { param: "password_encryption", value: "{{ postgres_password_encryption }}" }
    - { param: "log_connections",  value: "{{ postgres_log_connections }}" }
    - { param: "log_disconnections", value: "{{ postgres_log_disconnections }}" }
  register: postgres_config_changes
  tags: [postgres, postgres_install, postgres_config, postgres_hardening]

- name: "Reset postgresql.auto.conf to avoid conflicts with postgresql.conf"
  ansible.builtin.copy:
    content: "# Do not edit this file manually!\n# It will be overwritten by the ALTER SYSTEM command.\n"
    dest: "{{ postgres_config_dir[ansible_os_family] }}/postgresql.auto.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  when: postgres_config_changes is changed
  tags: [postgres, postgres_install, postgres_config]

- name: "Allow remote PostgreSQL client access in pg_hba.conf"
  community.postgresql.postgresql_pg_hba:
    dest: "{{ postgres_config_dir[ansible_os_family] }}/pg_hba.conf"
    contype: host
    users: all
    source: "{{ postgres_hba_cidr }}"
    databases: all
    method: "{{ postgres_hba_method }}"
    state: present
  become: true
  become_user: postgres
  when: postgres_manage_hba | bool
  register: postgres_hba_changes
  tags: [postgres, postgres_install, postgres_hardening, postgres_hba]

- name: "Restart PostgreSQL if configuration changed"
  ansible.builtin.service:
    name: "{{ postgres_service_name[ansible_os_family] }}"
    state: restarted
  when:
    - postgres_config_changes is changed or (postgres_hba_changes is defined and postgres_hba_changes is changed)
  tags: [postgres, postgres_install, postgres_service]

- name: "Create initial application database"
  community.postgresql.postgresql_db:
    name: "{{ postgres_initial_db_name }}"
    state: present
  become: true
  become_user: postgres
  when: create_initial_db | bool
  tags: [postgres, postgres_install, postgres_db, create_initial_db]

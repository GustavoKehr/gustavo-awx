---
# REPORT: remove this file and its import in main.yml to disable reporting.
# To disable via variable: set mysql_generate_report=false

- name: "[REPORT] MySQL Configuration Check — Console Summary"
  ansible.builtin.debug:
    msg: >-
      {{ item.id }} {{ item.name }}: {{ item.status }}{{ ' → FIXED' if item.fixed else '' }}{{ ' (' ~ item.note ~ ')' if item.note is defined and item.note else '' }}
  loop: "{{ _mysql_report | default([]) }}"
  when: mysql_generate_report | default(true) | bool
  tags: [mysql_configuration_check]

- name: "[REPORT] Compute summary counters"
  ansible.builtin.set_fact:
    _mysql_report_total: "{{ _mysql_report | default([]) | length }}"
    _mysql_report_pass:  "{{ _mysql_report | default([]) | selectattr('status', 'equalto', 'PASS') | list | length }}"
    _mysql_report_fixed: "{{ _mysql_report | default([]) | selectattr('fixed', 'equalto', true) | list | length }}"
    _mysql_report_fail:  "{{ _mysql_report | default([]) | selectattr('status', 'equalto', 'FAIL') | selectattr('fixed', 'equalto', false) | list | length }}"
    _mysql_report_filename: "mysql_config_check_{{ inventory_hostname }}_{{ ansible_date_time.date }}.html"
  when: mysql_generate_report | default(true) | bool
  tags: [mysql_configuration_check]

- name: "[REPORT] Console summary totals"
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════════════════
       MYSQL CONFIGURATION CHECK — {{ inventory_hostname }} — {{ ansible_date_time.date }}
      ════════════════════════════════════════════════════════
       Total : {{ _mysql_report_total }}
       Pass  : {{ _mysql_report_pass }}
       Fixed : {{ _mysql_report_fixed }}
       Fail  : {{ _mysql_report_fail }} (manual action required)
      ════════════════════════════════════════════════════════
       HTML report : /tmp/{{ _mysql_report_filename }}
      ════════════════════════════════════════════════════════
  when: mysql_generate_report | default(true) | bool
  tags: [mysql_configuration_check]

- name: "[REPORT] Generate HTML report"
  ansible.builtin.template:
    src: mysql_config_check_report.html.j2
    dest: "/tmp/{{ _mysql_report_filename }}"
    mode: "0644"
  when: mysql_generate_report | default(true) | bool
  tags: [mysql_configuration_check]

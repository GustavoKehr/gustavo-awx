---
# 2 - Password Complexity — validate_password plugin/component
# PASS: plugin active + length>=8, number_count>=1, special_char_count>=1
# FAIL: plugin not installed or params below threshold
# MySQL 8.0: component 'mysql.validate_password'; MySQL 5.x: plugin validate_password.so

- name: "2 - [CHECK] Get MySQL version"
  community.mysql.mysql_query:
    query: "SELECT VERSION() AS ver"
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] }}"
    login_user: root
    login_password: "{{ mysql_root_password | default('') }}"
  register: _mysql_2_ver_raw
  changed_when: false
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [CHECK] Set MySQL version fact"
  ansible.builtin.set_fact:
    _mysql_2_version: "{{ _mysql_2_ver_raw.query_result[0][0]['ver'] }}"
    _mysql_2_is_v8: "{{ _mysql_2_ver_raw.query_result[0][0]['ver'] is version('8.0', '>=') }}"
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [CHECK] Get validate_password variables"
  community.mysql.mysql_query:
    query: "SHOW GLOBAL VARIABLES LIKE 'validate_password%'"
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] }}"
    login_user: root
    login_password: "{{ mysql_root_password | default('') }}"
  register: _mysql_2_vars_raw
  changed_when: false
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [CHECK] Parse validate_password state"
  ansible.builtin.set_fact:
    _mysql_2_plugin_active: "{{ _mysql_2_vars_raw.query_result[0] | length > 0 }}"
    _mysql_2_vars_dict: >-
      {{ dict(_mysql_2_vars_raw.query_result[0]
         | map(attribute='Variable_name') | zip(
           _mysql_2_vars_raw.query_result[0] | map(attribute='Value'))) }}
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _mysql_2_length_ok: >-
      {{ (_mysql_2_vars_dict.get('validate_password.length',
          _mysql_2_vars_dict.get('validate_password_length', '0')) | int)
         >= (mysql_validate_password_length | int) }}
    _mysql_2_number_ok: >-
      {{ (_mysql_2_vars_dict.get('validate_password.number_count',
          _mysql_2_vars_dict.get('validate_password_number_count', '0')) | int)
         >= (mysql_validate_password_number_count | int) }}
    _mysql_2_special_ok: >-
      {{ (_mysql_2_vars_dict.get('validate_password.special_char_count',
          _mysql_2_vars_dict.get('validate_password_special_char_count', '0')) | int)
         >= (mysql_validate_password_special_char_count | int) }}
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [CHECK] Compliance summary"
  ansible.builtin.set_fact:
    _mysql_2_compliant: >-
      {{ _mysql_2_plugin_active and _mysql_2_length_ok and _mysql_2_number_ok and _mysql_2_special_ok }}
  tags: [mysql_configuration_check, conf, conf_2]

# ── FIX: install component (MySQL 8.0+) ──────────────────────────────────────
- name: "2 - [FIX] Install validate_password component (MySQL 8.0+)"
  community.mysql.mysql_query:
    query: "INSTALL COMPONENT 'file://component_validate_password'"
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] }}"
    login_user: root
    login_password: "{{ mysql_root_password | default('') }}"
  register: _mysql_2_comp_install
  when:
    - not _mysql_2_compliant
    - mysql_configuration_check_remediate | bool
    - _mysql_2_is_v8 | bool
    - not _mysql_2_plugin_active
  ignore_errors: true   # already installed → error is OK
  tags: [mysql_configuration_check, conf, conf_2]

# ── FIX: install plugin (MySQL 5.x) ──────────────────────────────────────────
- name: "2 - [FIX] Install validate_password plugin (MySQL 5.x)"
  community.mysql.mysql_query:
    query: "INSTALL PLUGIN validate_password SONAME 'validate_password.so'"
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] }}"
    login_user: root
    login_password: "{{ mysql_root_password | default('') }}"
  when:
    - not _mysql_2_compliant
    - mysql_configuration_check_remediate | bool
    - not (_mysql_2_is_v8 | bool)
    - not _mysql_2_plugin_active
  ignore_errors: true
  tags: [mysql_configuration_check, conf, conf_2]

# ── FIX: persist params in config file (apply after install) ─────────────────
- name: "2 - [FIX] Persist validate_password params in config file"
  ansible.builtin.blockinfile:
    path: "{{ mysql_config_file[ansible_os_family] }}"
    marker: "# {mark} ANSIBLE MANAGED — validate_password"
    insertafter: "^\\[mysqld\\]"
    block: |
      validate_password_length = {{ mysql_validate_password_length }}
      validate_password_number_count = {{ mysql_validate_password_number_count }}
      validate_password_special_char_count = {{ mysql_validate_password_special_char_count }}
      {% if not _mysql_2_is_v8 | bool %}
      plugin-load = validate_password=validate_password.so
      validate-password = FORCE_PLUS_PERMANENT
      {% endif %}
  register: _mysql_2_fix
  when:
    - not _mysql_2_compliant
    - mysql_configuration_check_remediate | bool
  tags: [mysql_configuration_check, conf, conf_2]

- name: "2 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _mysql_report: >-
      {{ _mysql_report | default([]) + [{
        'id': '2', 'name': 'validate_password plugin',
        'status': 'PASS' if _mysql_2_compliant else 'FAIL',
        'fixed': (_mysql_2_fix is defined and _mysql_2_fix is changed) | bool,
        'note': 'MySQL ' ~ _mysql_2_version
      }] }}
  tags: [mysql_configuration_check, conf, conf_2]

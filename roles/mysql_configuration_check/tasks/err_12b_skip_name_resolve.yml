---
# 12b - skip_name_resolve = ON
# PASS: ON — no DNS lookup on connect; faster + prevents DNS-based blocking
# FAIL: OFF — DNS lookups on every connection; max_connect_errors also has less effect
# NOTE: When ON, user grants must use IP (not hostname); localhost still works

- name: "12b - [CHECK] Get skip_name_resolve"
  community.mysql.mysql_query:
    query: "SHOW GLOBAL VARIABLES LIKE 'skip_name_resolve'"
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] }}"
    login_user: root
    login_password: "{{ mysql_root_password | default('') }}"
  register: _mysql_12b_raw
  changed_when: false
  tags: [mysql_configuration_check, err, err_12b]

- name: "12b - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _mysql_12b_current: "{{ (_mysql_12b_raw.query_result[0][0]['Value'] | default('OFF')) | upper }}"
    _mysql_12b_compliant: "{{ (_mysql_12b_raw.query_result[0][0]['Value'] | default('OFF') | upper) == 'ON' }}"
  tags: [mysql_configuration_check, err, err_12b]

- name: "12b - [FIX] Set skip_name_resolve in config file (requires restart)"
  ansible.builtin.lineinfile:
    path: "{{ mysql_config_file[ansible_os_family] }}"
    regexp: '^skip.name.resolve'
    line: "skip-name-resolve"
    insertafter: "^\\[mysqld\\]"
    backup: true
  register: _mysql_12b_fix
  when:
    - not _mysql_12b_compliant
    - mysql_configuration_check_remediate | bool
  tags: [mysql_configuration_check, err, err_12b]

- name: "12b - [FIX] Flag restart needed"
  ansible.builtin.set_fact:
    _mysql_restart_needed: true
  when:
    - _mysql_12b_fix is defined
    - _mysql_12b_fix is changed
  tags: [mysql_configuration_check, err, err_12b]

- name: "12b - [REPORT] Store result"
  ansible.builtin.set_fact:
    _mysql_report: >-
      {{ _mysql_report | default([]) + [{
        'id': '12b', 'name': 'skip_name_resolve = ON',
        'status': 'PASS' if _mysql_12b_compliant else 'FAIL',
        'fixed': (_mysql_12b_fix is defined and _mysql_12b_fix is changed) | bool,
        'note': 'Current: ' ~ _mysql_12b_current ~ ' — Restart required'
      }] }}
  tags: [mysql_configuration_check, err, err_12b]

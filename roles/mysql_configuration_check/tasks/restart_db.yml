---
# Single restart point — only triggers when params needing restart were changed
# Controlled by:
#   _mysql_restart_needed: true  (set by individual check tasks)
#   mysql_configuration_check_allow_restart: true  (user-controlled gate)

- name: "[RESTART] Restart MySQL to activate static parameter changes"
  ansible.builtin.service:
    name: "{{ mysql_service_name[ansible_os_family] }}"
    state: restarted
  when:
    - _mysql_restart_needed | default(false) | bool
    - mysql_configuration_check_allow_restart | default(true) | bool
  tags: [mysql_configuration_check]

- name: "[RESTART] Warn if restart skipped but needed"
  ansible.builtin.debug:
    msg: >-
      WARNING: Some parameters (skip_show_database, innodb_log_file_size,
      innodb_read/write_io_threads, open_files_limit, skip_name_resolve)
      require a MySQL restart to activate. Restart was skipped because
      mysql_configuration_check_allow_restart=false. Restart MySQL manually.
  when:
    - _mysql_restart_needed | default(false) | bool
    - not (mysql_configuration_check_allow_restart | default(true) | bool)
  tags: [mysql_configuration_check]

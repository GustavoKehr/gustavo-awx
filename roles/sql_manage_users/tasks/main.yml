---
- name: "Build db_users from flat survey vars when list not provided"
  ansible.builtin.set_fact:
    db_users:
      - username: "{{ sql_login_name }}"
        password: "{{ sql_login_password | default('') }}"
        login_type: "{{ sql_login_type | default('sql') }}"
        state: "{{ sql_login_state | default('present') }}"
        default_db: "{{ sql_login_default_db | default('master') }}"
        databases: >-
          {{
            [sql_target_database]
            if (sql_target_database | default('') | length > 0)
            else []
          }}
        db_user: "{{ sql_database_user | default('') }}"
        roles: >-
          {{
            (sql_database_roles | default(''))
            | string | split(',')
            | map('trim') | reject('equalto', '') | list
          }}
        revoke: "{{ sql_revoke_access | default(false) | bool }}"
        manage_db_user: "{{ sql_manage_database_user | default(true) | bool }}"
        allowed_ips: >-
          {{
            (sql_allowed_ips | default(''))
            | string | split(',')
            | map('trim') | reject('equalto', '') | list
          }}
  when:
    - db_users | default([]) | length == 0
    - sql_login_name | default('') | length > 0
  tags: [sql_users]

- name: "Validate db_users list is not empty"
  ansible.builtin.assert:
    that:
      - db_users | length > 0
    fail_msg: "db_users list is empty. Provide at least one user entry."
  tags: [sql_users, sql_users_validate]

- name: "Manage each SQL Server user"
  ansible.builtin.include_tasks: manage_user.yml
  loop: "{{ db_users }}"
  loop_control:
    loop_var: db_user
    label: "{{ db_user.username }}"
  tags: [sql_users]

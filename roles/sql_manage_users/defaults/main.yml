#     state: present                  # present | absent
#     default_db: master              # login default database
#     databases: ["sqldb"]            # databases to map user into (list or comma-separated)
#     db_user: ""                     # DB-level username if different from login name
#     roles: ["db_datareader"]        # database roles to grant
#     revoke: false                   # true = revoke roles (state must be present)
#     manage_db_user: true            # true = create DB user mapping
#     allowed_ips: []                 # IPs to append to IPsec SQL Server filter
db_users: []

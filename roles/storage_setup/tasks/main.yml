---
- name: "inicializa disco como GPT"
  ansible.windows.win_shell: |
    $disk = Get-Disk -Number {{ win_disk_number | int }}
    if ($disk.partitionstyle -eq 'raw') {
        Initialize-Disk -Number {{ win_disk_number | int }} -PartitionStyle GPT
        Write-Output "Disco inicializado como GPT"
    }
  tags: [storage, storage_partition]

- name: "criar volume no disco {{ win_disk_number }} como E"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Check if E: already exists on the target disk (idempotent re-run)
    $existingPart = Get-Partition -DriveLetter E -ErrorAction SilentlyContinue
    if ($existingPart -and $existingPart.DiskNumber -eq $diskNum) {
        Write-Output "SKIP: E: already exists on disk $diskNum"
        exit 0
    }
    # If disk already has a data partition with no letter, assign E: to it
    $diskParts = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue |
                 Where-Object { $_.Type -eq 'Basic' -and -not $_.DriveLetter }
    if ($diskParts) {
        # If E: is taken by CD-ROM/removable, move it first
        $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
        if ($cdrom) {
            $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
            Write-Output "Reassigned CD/removable from E: to X:"
        }
        $diskParts[0] | Set-Partition -NewDriveLetter E
        Write-Output "Assigned E: to existing partition on disk $diskNum"
        exit 0
    }
    # No partition on disk — reassign CD-ROM if needed, then create partition
    $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
    if ($cdrom) {
        $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
        Write-Output "Reassigned CD/removable from E: to X:"
    }
    New-Partition -DiskNumber $diskNum -UseMaximumSize -DriveLetter E | Out-Null
    Write-Output "Created new partition E: on disk $diskNum"
  register: disk_part
  changed_when: "'SKIP:' not in disk_part.stdout"
  tags: [storage, storage_partition]

- name: "formatar com NTFS 64K no disco de dados"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Find data partition by disk number (never rely on drive letter for detection)
    $dataPart = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue |
                Where-Object { $_.Type -eq 'Basic' } |
                Select-Object -First 1
    if (-not $dataPart) {
        Write-Error "No Basic partition found on disk $diskNum"
        exit 1
    }
    # Use Get-Volume -DriveLetter (actual filesystem mount) not Get-Partition (metadata only)
    # This correctly detects whether E: is truly accessible as our data volume
    $eVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if ($eVol -and $eVol.FileSystem -eq 'NTFS' -and $eVol.FileSystemLabel -eq 'SQL_DATA') {
        Write-Output "SKIP: E: is accessible as NTFS SQL_DATA volume"
        exit 0
    }
    # E: is not our data volume — check if label is right but drive letter is gone
    $dataVol = $dataPart | Get-Volume -ErrorAction SilentlyContinue
    if ($dataVol -and $dataVol.FileSystem -eq 'NTFS' -and $dataVol.FileSystemLabel -eq 'SQL_DATA') {
        # Formatted correctly but E: lost (likely CD-ROM stole it) — re-assign without format
        Write-Output "Data partition is SQL_DATA but E: lost — reassigning"
        $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
        if ($cdrom) {
            $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
            Write-Output "Evicted CD/removable from E: to X:"
        }
        $dataPart | Set-Partition -NewDriveLetter E
        Write-Output "Re-assigned E: to data partition on disk $diskNum"
        exit 0
    }
    # Partition needs formatting — move CD-ROM off E: first
    $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
    if ($cdrom) {
        $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
        Write-Output "Pre-format: Reassigned CD/removable from E: to X:"
    }
    # Format by partition object — immune to drive-letter being grabbed during dismount
    $dataPart | Format-Volume -FileSystem NTFS -AllocationUnitSize 65536 `
        -NewFileSystemLabel 'SQL_DATA' -Confirm:$false -Force | Out-Null
    Write-Output "Formatted data partition on disk $diskNum as NTFS 64K SQL_DATA"
    # Post-format: use Get-Volume (not Get-Partition) to verify E: is truly accessible
    $eVol2 = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if (-not $eVol2 -or $eVol2.FileSystemLabel -ne 'SQL_DATA') {
        Write-Output "Post-format: E: not accessible as SQL_DATA — reassigning"
        $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
        if ($cdrom) {
            $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
            Write-Output "Post-format: Evicted CD/removable from E: to X:"
        }
        $freshPart = Get-Partition -DiskNumber $diskNum |
                     Where-Object { $_.Type -eq 'Basic' } |
                     Select-Object -First 1
        if ($freshPart) {
            $freshPart | Set-Partition -NewDriveLetter E
            Write-Output "Post-format: Re-assigned E: to data partition on disk $diskNum"
        }
    } else {
        Write-Output "Post-format: E: accessible as SQL_DATA"
    }
  changed_when: "'SKIP:' not in (format_result.stdout | default(''))"
  register: format_result
  tags: [storage, storage_format]

- name: "criar pasta da instalacao do SQL no E"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Final guard: ensure E: is truly accessible before creating folder
    $eVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if (-not $eVol -or $eVol.FileSystemLabel -ne 'SQL_DATA') {
        Write-Output "E: not ready — recovering drive letter"
        $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
        if ($cdrom) {
            $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
            Write-Output "Evicted CD/removable from E: to X:"
        }
        $dataPart = Get-Partition -DiskNumber $diskNum | Where-Object { $_.Type -eq 'Basic' } | Select-Object -First 1
        if ($dataPart) {
            $dataPart | Set-Partition -NewDriveLetter E
            Write-Output "Recovered E: on disk $diskNum"
        } else {
            Write-Error "Cannot find data partition on disk $diskNum"
            exit 1
        }
    }
    # Create folder (idempotent)
    if (-not (Test-Path 'E:\SQLServer_Root')) {
        New-Item -Path 'E:\SQLServer_Root' -ItemType Directory | Out-Null
        Write-Output "Created E:\SQLServer_Root"
    } else {
        Write-Output "SKIP: E:\SQLServer_Root already exists"
    }
  changed_when: "'SKIP:' not in folder_result.stdout"
  register: folder_result
  tags: [storage, storage_folders]

- name: "Dar permissão ao Network Service (Ele já existe e o SQL precisa dele)"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "S-1-5-20"  # Este é o SID do Network Service, funciona sempre
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit

- name: "Dar permissão ao grupo de Administradores"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "BUILTIN\\Administrators"
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
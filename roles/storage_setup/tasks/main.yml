---
- name: "inicializa disco como GPT"
  ansible.windows.win_shell: |
    $disk = Get-Disk -Number {{ win_disk_number | int }}
    if ($disk.partitionstyle -eq 'raw') {
        Initialize-Disk -Number {{ win_disk_number | int }} -PartitionStyle GPT
        Write-Output "Disco inicializado como GPT"
    }
  tags: [storage, storage_partition]

- name: "criar volume no disco {{ win_disk_number }} como E"
  ansible.windows.win_shell: |
    # Check if E: already exists on the target disk (idempotent re-run)
    $targetDisk = Get-Disk -Number {{ win_disk_number | int }} -ErrorAction SilentlyContinue
    $existingPart = Get-Partition -DriveLetter E -ErrorAction SilentlyContinue
    if ($existingPart -and $existingPart.DiskNumber -eq {{ win_disk_number | int }}) {
        Write-Output "SKIP: E: already exists on disk {{ win_disk_number }}"
        exit 0
    }
    # If E: is used by a CD-ROM/removable drive, reassign it first
    $cdrom = Get-WmiObject Win32_Volume | Where-Object { $_.DriveLetter -eq 'E:' -and $_.DriveType -in @(5,2) }
    if ($cdrom) {
        $cdrom | Set-WmiInstance -Arguments @{DriveLetter='X:'} | Out-Null
        Write-Output "Reassigned CD/removable from E: to X:"
    }
    # Create partition using all available space
    $part = New-Partition -DiskNumber {{ win_disk_number | int }} -UseMaximumSize -DriveLetter E
    Write-Output "Created partition E: on disk {{ win_disk_number }}"
  register: disk_part
  changed_when: "'SKIP:' not in disk_part.stdout"
  tags: [storage, storage_partition]

- name: "formatar com NTFS 64K no disco E"
  community.windows.win_format:
    drive_letter: E
    file_system: ntfs
    new_label: 'SQL_DATA'
    allocation_unit_size: 65536
  when: disk_part.changed
  tags: [storage, storage_format]

- name: "criar pasta da instalacao do SQL no E"
  ansible.windows.win_file:
    path: 'E:\SQLServer_Root'
    state: directory
  tags: [storage, storage_folders]

- name: "Dar permissão ao Network Service (Ele já existe e o SQL precisa dele)"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "S-1-5-20"  # Este é o SID do Network Service, funciona sempre
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit

- name: "Dar permissão ao grupo de Administradores"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "BUILTIN\\Administrators"
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit
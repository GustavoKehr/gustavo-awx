---
- name: "remover letra E: do CD-ROM e desativar dispositivo"
  ansible.windows.win_shell: |
    # Remove CD-ROM drive letters from MountedDevices registry AND disable device
    # Prevents CD-ROM from blocking E: assignment (even disabled devices keep MountedDevices entries)
    $cdromVols = Get-WmiObject Win32_Volume | Where-Object { $_.DriveType -in @(5,2) -and $_.DriveLetter }
    foreach ($vol in $cdromVols) {
        $letter = $vol.DriveLetter  # e.g., "E:"
        # mountvol /D removes the MountedDevices registry entry — persistent across tasks
        $null = & mountvol $letter /D 2>&1
        Write-Output "Removed $letter from CD-ROM MountedDevices via mountvol /D"
    }
    $cdromDevs = Get-PnpDevice -Class CDROM -Status OK -ErrorAction SilentlyContinue
    if (-not $cdromDevs) {
        Write-Output "CD-ROM letter cleanup done (device already disabled or absent)"
        exit 0
    }
    foreach ($dev in $cdromDevs) {
        Disable-PnpDevice -InstanceId $dev.InstanceId -Confirm:$false -ErrorAction SilentlyContinue | Out-Null
        Write-Output "Disabled: $($dev.FriendlyName)"
    }
  changed_when: true
  tags: [storage, storage_partition]

- name: "inicializa disco como GPT"
  ansible.windows.win_shell: |
    $disk = Get-Disk -Number {{ win_disk_number | int }}
    if ($disk.partitionstyle -eq 'raw') {
        Initialize-Disk -Number {{ win_disk_number | int }} -PartitionStyle GPT
        Write-Output "Disco inicializado como GPT"
    }
  tags: [storage, storage_partition]

- name: "criar volume no disco {{ win_disk_number }} como E"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Use Get-Volume (actual mount) not Get-Partition (metadata only) for SKIP check
    $existingVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if ($existingVol) {
        $existingPart = Get-Partition -DriveLetter E -ErrorAction SilentlyContinue
        if ($existingPart -and $existingPart.DiskNumber -eq $diskNum) {
            Write-Output "SKIP: E: already mounted on disk $diskNum"
            exit 0
        }
    }
    # Find existing Basic partition on target disk (with or without drive letter)
    $dataPart = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue |
                Where-Object { $_.Type -eq 'Basic' } |
                Select-Object -First 1
    if ($dataPart) {
        # Partition exists — mount it at E: using Add-PartitionAccessPath (force actual mount)
        # First remove any existing access path to avoid "already exists" errors
        $dataPart | Remove-PartitionAccessPath -AccessPath 'E:\' -ErrorAction SilentlyContinue
        $dataPart | Add-PartitionAccessPath -AccessPath 'E:\'
        Write-Output "Mounted existing partition as E: on disk $diskNum (Add-PartitionAccessPath)"
        exit 0
    }
    # No partition — create one and mount at E:
    $newPart = New-Partition -DiskNumber $diskNum -UseMaximumSize
    $newPart | Add-PartitionAccessPath -AccessPath 'E:\'
    Write-Output "Created new partition and mounted as E: on disk $diskNum"
  register: disk_part
  changed_when: "'SKIP:' not in disk_part.stdout"
  tags: [storage, storage_partition]

- name: "formatar com NTFS 64K no disco de dados"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Find data partition by disk number
    $dataPart = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue |
                Where-Object { $_.Type -eq 'Basic' } |
                Select-Object -First 1
    if (-not $dataPart) {
        Write-Error "No Basic partition found on disk $diskNum"
        exit 1
    }
    # Check via Get-Volume -DriveLetter E (actual mount, not metadata)
    $eVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if ($eVol -and $eVol.FileSystem -eq 'NTFS' -and $eVol.FileSystemLabel -eq 'SQL_DATA') {
        Write-Output "SKIP: E: is accessible as NTFS SQL_DATA"
        exit 0
    }
    # Check if data partition is SQL_DATA but just not mounted at E:
    $dataVol = $dataPart | Get-Volume -ErrorAction SilentlyContinue
    if ($dataVol -and $dataVol.FileSystem -eq 'NTFS' -and $dataVol.FileSystemLabel -eq 'SQL_DATA') {
        Write-Output "SQL_DATA partition exists but E: not mounted — remounting"
        $dataPart | Remove-PartitionAccessPath -AccessPath 'E:\' -ErrorAction SilentlyContinue
        $dataPart | Add-PartitionAccessPath -AccessPath 'E:\'
        Write-Output "Remounted E: on disk $diskNum"
        exit 0
    }
    # Format the partition (no NTFS SQL_DATA found)
    $dataPart | Format-Volume -FileSystem NTFS -AllocationUnitSize 65536 `
        -NewFileSystemLabel 'SQL_DATA' -Confirm:$false -Force | Out-Null
    Write-Output "Formatted disk $diskNum partition as NTFS 64K SQL_DATA"
    # Ensure E: is mounted after format
    $dataPart | Remove-PartitionAccessPath -AccessPath 'E:\' -ErrorAction SilentlyContinue
    $dataPart | Add-PartitionAccessPath -AccessPath 'E:\'
    Write-Output "Mounted E: after format"
  changed_when: "'SKIP:' not in (format_result.stdout | default(''))"
  register: format_result
  tags: [storage, storage_format]

- name: "criar pasta da instalacao do SQL no E"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    # Final guard: verify E: is accessible as SQL_DATA
    $eVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if (-not $eVol -or $eVol.FileSystemLabel -ne 'SQL_DATA') {
        Write-Output "E: not ready — force-remounting data partition"
        $dataPart = Get-Partition -DiskNumber $diskNum | Where-Object { $_.Type -eq 'Basic' } | Select-Object -First 1
        if ($dataPart) {
            $dataPart | Remove-PartitionAccessPath -AccessPath 'E:\' -ErrorAction SilentlyContinue
            $dataPart | Add-PartitionAccessPath -AccessPath 'E:\'
            Write-Output "Force-remounted E: on disk $diskNum"
        } else {
            Write-Error "Cannot find data partition on disk $diskNum"
            exit 1
        }
    }
    if (-not (Test-Path 'E:\SQLServer_Root')) {
        New-Item -Path 'E:\SQLServer_Root' -ItemType Directory | Out-Null
        Write-Output "Created E:\SQLServer_Root"
    } else {
        Write-Output "SKIP: E:\SQLServer_Root already exists"
    }
  changed_when: "'SKIP:' not in folder_result.stdout"
  register: folder_result
  tags: [storage, storage_folders]

- name: "Dar permissão ao Network Service (Ele já existe e o SQL precisa dele)"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "S-1-5-20"  # SID do Network Service
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit

- name: "Dar permissão ao grupo de Administradores"
  ansible.windows.win_acl:
    path: "E:\\SQLServer_Root"
    user: "BUILTIN\\Administrators"
    rights: FullControl
    type: allow
    state: present
    inherit: ContainerInherit, ObjectInherit

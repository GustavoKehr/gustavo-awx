---
# 8 - work_mem >= 16MB (in KB internally)

- name: "8 - [CHECK] Get work_mem"
  become: true
  become_user: postgres
  community.postgresql.postgresql_query:
    query: "SELECT setting::int AS kb FROM pg_settings WHERE name='work_mem'"
    login_unix_socket: "{{ postgres_login_unix_socket[ansible_os_family] }}"
  register: _pg_8_raw
  changed_when: false
  tags: [postgres_configuration_check, conf, conf_8]

- name: "8 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _pg_8_compliant: "{{ (_pg_8_raw.query_result[0][0]['kb'] | int) >= (postgres_work_mem_min_mb | int * 1024) }}"
  tags: [postgres_configuration_check, conf, conf_8]

- name: "8 - [FIX] Set work_mem in postgresql.conf"
  ansible.builtin.lineinfile:
    path: "{{ postgres_config_file[ansible_os_family] }}"
    regexp: '^#?\s*work_mem\s*='
    line: "work_mem = {{ postgres_work_mem_min_mb }}MB"
  register: _pg_8_fix
  when:
    - not _pg_8_compliant
    - postgres_configuration_check_remediate | bool
  tags: [postgres_configuration_check, conf, conf_8]

- name: "8 - [FIX] Flag restart needed"
  ansible.builtin.set_fact:
    _pg_restart_needed: true
  when:
    - _pg_8_fix is defined
    - _pg_8_fix is changed
  tags: [postgres_configuration_check, conf, conf_8]

- name: "8 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _pg_report: >-
      {{ _pg_report | default([]) + [{
        'id': '8', 'name': 'work_mem >= 16MB',
        'status': 'PASS' if _pg_8_compliant else 'FAIL',
        'note': 'Current: ' ~ ((_pg_8_raw.query_result[0][0]['kb'] | int) // 1024) ~ ' MB'
      }] }}
  tags: [postgres_configuration_check, conf, conf_8]

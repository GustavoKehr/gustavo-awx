---
# Create WSFC on primary node. Uses -AdministrativeAccessPoint DNS for workgroup
# clusters (no AD computer object — DNS-only CAP).
# Run only on primary node (enforced in playbook).
#
# Requires CredSSP transport (set in playbook Play 4 vars) so New-Cluster
# can authenticate to the secondary node. Prerequisites enable CredSSP server.

# Clean up any partial cluster state from failed previous attempts.
- name: "Clean up partial cluster state on primary if needed"
  ansible.windows.win_shell: |
    $svc = Get-Service ClusSvc -ErrorAction SilentlyContinue
    if ($svc -and $svc.StartType -in @('Automatic','Manual') -and $svc.Status -eq 'Stopped') {
      $cluster = Get-Cluster -ErrorAction SilentlyContinue
      if ($cluster) {
        Remove-Cluster -Force -CleanUpAD -ErrorAction SilentlyContinue
      }
      Set-Service ClusSvc -StartupType Disabled -ErrorAction SilentlyContinue
      Remove-Item "C:\Windows\Cluster\*" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Output "CLEANED"
    } else {
      Write-Output "OK: no partial state"
    }
  changed_when: "'CLEANED' in _cluster_cleanup.stdout"
  register: _cluster_cleanup

- name: "Clean up partial cluster state on secondary if needed"
  ansible.windows.win_shell: |
    $svc = Get-Service ClusSvc -ErrorAction SilentlyContinue
    if ($svc -and $svc.StartType -in @('Automatic','Manual') -and $svc.Status -eq 'Stopped') {
      Set-Service ClusSvc -StartupType Disabled -ErrorAction SilentlyContinue
      Remove-Item "C:\Windows\Cluster\*" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Output "CLEANED"
    } else {
      Write-Output "OK: no partial state"
    }
  changed_when: "'CLEANED' in _secondary_cleanup.stdout"
  register: _secondary_cleanup
  delegate_to: "{{ wsfc_secondary_node }}"

- name: "Run cluster prerequisite validation"
  ansible.windows.win_shell: |
    $result = Test-Cluster `
      -Node "{{ wsfc_primary_node }}","{{ wsfc_secondary_node }}" `
      -Include "System Configuration","Network","Inventory" `
      -ErrorAction SilentlyContinue
    $errors = $result | Where-Object { $_.Severity -eq "Error" }
    if ($errors) {
      Write-Output "VALIDATION_FAILED"
      $errors | ForEach-Object { Write-Output "$($_.Description)" }
    } else {
      Write-Output "VALIDATION_OK"
    }
  register: _cluster_validation
  changed_when: false
  failed_when: "'VALIDATION_FAILED' in _cluster_validation.stdout"

- name: "Create failover cluster (DNS CAP — workgroup mode)"
  ansible.windows.win_shell: |
    $existing = Get-Cluster -Name "{{ wsfc_cluster_name }}" -ErrorAction SilentlyContinue
    if ($existing) {
      Write-Output "OK: Cluster already exists"
      exit 0
    }
    Import-Module FailoverClusters
    $r = New-Cluster `
      -Name "{{ wsfc_cluster_name }}" `
      -Node "{{ wsfc_primary_node }}","{{ wsfc_secondary_node }}" `
      -StaticAddress "{{ wsfc_cluster_ip }}" `
      -NoStorage `
      -AdministrativeAccessPoint DNS `
      -ErrorAction Stop
    Write-Output "CHANGED: $($r.Name)"
  register: _cluster_create
  changed_when: "'CHANGED:' in _cluster_create.stdout"

- name: "Show cluster creation result"
  ansible.builtin.debug:
    msg: "{{ _cluster_create.stdout_lines }}"

- name: "Wait for cluster to stabilize"
  ansible.windows.win_shell: |
    $retries = 0
    do {
      Start-Sleep -Seconds 5
      $nodes = Get-ClusterNode -ErrorAction SilentlyContinue
      $retries++
    } until ($nodes -or $retries -ge 24)
    if (-not $nodes) {
      Write-Output "TIMEOUT"
    } else {
      $nodes | ForEach-Object { Write-Output "$($_.Name): $($_.State)" }
    }
  register: _cluster_wait
  changed_when: false
  failed_when: "'TIMEOUT' in _cluster_wait.stdout"

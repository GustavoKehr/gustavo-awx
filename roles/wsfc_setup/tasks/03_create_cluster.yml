---
# Create WSFC on primary node. Uses -AdministrativeAccessPoint DNS for workgroup
# clusters (no AD computer object — DNS-only CAP).
# Run only on primary node (enforced in playbook).
#
# New-Cluster requires admin access to the secondary node via WMI/RPC.
# Running inside a WinRM NTLM session causes double-hop auth failures.
# Solution: use schtasks.exe to run New-Cluster as a scheduled task with
# explicit credentials — scheduled tasks execute in a full logon session
# that can authenticate to remote machines.

# Clean up any partial cluster state from failed previous attempts.
- name: "Clean up partial cluster state on primary if needed"
  ansible.windows.win_shell: |
    $svc = Get-Service ClusSvc -ErrorAction SilentlyContinue
    if ($svc -and $svc.StartType -in @('Automatic','Manual') -and $svc.Status -eq 'Stopped') {
      $cluster = Get-Cluster -ErrorAction SilentlyContinue
      if ($cluster) {
        Remove-Cluster -Force -CleanUpAD -ErrorAction SilentlyContinue
      }
      Set-Service ClusSvc -StartupType Disabled -ErrorAction SilentlyContinue
      Remove-Item "C:\Windows\Cluster\*" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Output "CLEANED"
    } else {
      Write-Output "OK: no partial state"
    }
  changed_when: "'CLEANED' in _cluster_cleanup.stdout"
  register: _cluster_cleanup

- name: "Clean up partial cluster state on secondary if needed"
  ansible.windows.win_shell: |
    $svc = Get-Service ClusSvc -ErrorAction SilentlyContinue
    if ($svc -and $svc.StartType -in @('Automatic','Manual') -and $svc.Status -eq 'Stopped') {
      Set-Service ClusSvc -StartupType Disabled -ErrorAction SilentlyContinue
      Remove-Item "C:\Windows\Cluster\*" -Recurse -Force -ErrorAction SilentlyContinue
      Write-Output "CLEANED"
    } else {
      Write-Output "OK: no partial state"
    }
  changed_when: "'CLEANED' in _secondary_cleanup.stdout"
  register: _secondary_cleanup
  delegate_to: "{{ wsfc_secondary_node }}"

- name: "Run cluster prerequisite validation"
  ansible.windows.win_shell: |
    $result = Test-Cluster `
      -Node "{{ wsfc_primary_node }}","{{ wsfc_secondary_node }}" `
      -Include "System Configuration","Network","Inventory" `
      -ErrorAction SilentlyContinue
    $errors = $result | Where-Object { $_.Severity -eq "Error" }
    if ($errors) {
      Write-Output "VALIDATION_FAILED"
      $errors | ForEach-Object { Write-Output "$($_.Description)" }
    } else {
      Write-Output "VALIDATION_OK"
    }
  register: _cluster_validation
  changed_when: false
  failed_when: "'VALIDATION_FAILED' in _cluster_validation.stdout"

- name: "Write New-Cluster script to disk on primary node"
  ansible.windows.win_shell: |
    $existing = Get-Cluster -Name "{{ wsfc_cluster_name }}" -ErrorAction SilentlyContinue
    if ($existing) {
      Write-Output "SKIP: cluster already exists"
      exit 0
    }
    # Write PowerShell script that will run via scheduled task
    $script = @"
Import-Module FailoverClusters
try {
  `$r = New-Cluster ``
    -Name '{{ wsfc_cluster_name }}' ``
    -Node '{{ wsfc_primary_node }}','{{ wsfc_secondary_node }}' ``
    -StaticAddress '{{ wsfc_cluster_ip }}' ``
    -NoStorage ``
    -AdministrativeAccessPoint DNS ``
    -ErrorAction Stop
  "CHANGED:`$(`$r.Name)" | Out-File 'C:\ansible_temp\cluster_result.txt' -Encoding UTF8
} catch {
  "ERROR:`$(`$_.Exception.Message)" | Out-File 'C:\ansible_temp\cluster_result.txt' -Encoding UTF8
  exit 1
}
"@
    $script | Out-File 'C:\ansible_temp\new_cluster.ps1' -Encoding UTF8
    Remove-Item 'C:\ansible_temp\cluster_result.txt' -ErrorAction SilentlyContinue
    Write-Output "WRITTEN"
  register: _script_write
  changed_when: "'WRITTEN' in _script_write.stdout"

- name: "Create failover cluster via scheduled task (bypasses WinRM double-hop)"
  ansible.windows.win_shell: |
    $existing = Get-Cluster -Name "{{ wsfc_cluster_name }}" -ErrorAction SilentlyContinue
    if ($existing) {
      Write-Output "OK: Cluster already exists"
      exit 0
    }

    # Scheduled tasks run in a full interactive logon session with real credentials.
    # This bypasses the WinRM NTLM double-hop restriction that blocks New-Cluster.
    $pass = '{{ ansible_password }}'

    # Create the task (overwrite if exists)
    $null = schtasks /Create /TN "WSFCCreate" `
      /TR "powershell.exe -NoProfile -NonInteractive -ExecutionPolicy Bypass -File C:\ansible_temp\new_cluster.ps1" `
      /SC ONCE /ST "00:00" /RU "Administrator" /RP "$pass" /F 2>&1

    # Run it immediately
    $null = schtasks /Run /TN "WSFCCreate" 2>&1

    # Poll for result file (max 10 minutes)
    $waited = 0
    do {
      Start-Sleep -Seconds 10
      $waited += 10
      $done = Test-Path 'C:\ansible_temp\cluster_result.txt'
    } until ($done -or $waited -ge 600)

    # Clean up scheduled task
    $null = schtasks /Delete /TN "WSFCCreate" /F 2>&1

    if (-not $done) {
      Write-Output "TIMEOUT: New-Cluster did not complete in 10 minutes"
    } else {
      $result = (Get-Content 'C:\ansible_temp\cluster_result.txt' -Raw).Trim()
      Write-Output $result
    }
  register: _cluster_create
  changed_when: "'CHANGED:' in _cluster_create.stdout"
  failed_when: >
    'ERROR:' in _cluster_create.stdout or
    'TIMEOUT:' in _cluster_create.stdout
  no_log: true

- name: "Show cluster creation result"
  ansible.builtin.debug:
    msg: "{{ _cluster_create.stdout_lines }}"
  when: not _cluster_create.skipped | default(false)

- name: "Wait for cluster to stabilize"
  ansible.windows.win_shell: |
    $retries = 0
    do {
      Start-Sleep -Seconds 5
      $nodes = Get-ClusterNode -ErrorAction SilentlyContinue
      $retries++
    } until ($nodes -or $retries -ge 24)
    if (-not $nodes) {
      Write-Output "TIMEOUT"
    } else {
      $nodes | ForEach-Object { Write-Output "$($_.Name): $($_.State)" }
    }
  register: _cluster_wait
  changed_when: false
  failed_when: "'TIMEOUT' in _cluster_wait.stdout"

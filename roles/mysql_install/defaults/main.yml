---
# Packages and service names per OS family.
mysql_server_packages:
  RedHat:
    - mysql-server
    - python3-PyMySQL
  Debian:
    - mysql-server
    - python3-pymysql

mysql_service_name:
  RedHat: mysqld
  Debian: mysql

# Main server config path per OS family.
mysql_config_file:
  RedHat: /etc/my.cnf
  Debian: /etc/mysql/mysql.conf.d/mysqld.cnf

# Runtime socket path used by community.mysql modules.
mysql_login_unix_socket:
  RedHat: /var/lib/mysql/mysql.sock
  Debian: /var/run/mysqld/mysqld.sock

# Core hardening/performance defaults.
# Listen on the host primary interface by default (AWX facts-driven).
# Override per host/group when needed.
mysql_bind_address: "{{ ansible_default_ipv4.address | default('127.0.0.1') }}"
mysql_port: 13306
mysql_max_connections: 300
mysql_innodb_buffer_pool_size: "1G"
mysql_sql_mode: "STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
mysql_skip_name_resolve: true
mysql_local_infile: 0
mysql_symbolic_links: 0

# Root credentials (optional). Keep empty to avoid changes.
mysql_root_password: "Admin#!123"

# Secure deployment actions.
mysql_remove_anonymous_users: true
mysql_remove_test_database: true
mysql_disallow_remote_root: true

---
# 1.8 - _cleanup_rollback_entries
# PASS: value >= 2000
# FAIL: value < 2000
# Fix: scope=spfile; DB restart handled by restart_db.yml

- name: "1.8 - [CHECK] Query _cleanup_rollback_entries"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF
    SELECT max(ksppstvl) FROM x$ksppi a, x$ksppsv b
    WHERE a.indx = b.indx AND ksppinm = '_cleanup_rollback_entries';
    EXIT;
    EOF
  register: _sec_1_8_result
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_8]

- name: "1.8 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _sec_1_8_value: "{{ _sec_1_8_result.stdout | trim | int }}"
    _sec_1_8_compliant: "{{ _sec_1_8_result.stdout | trim | int >= 2000 }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_8]

- name: "1.8 - [FIX] Set _cleanup_rollback_entries=2000 in spfile"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    ALTER SYSTEM SET "_cleanup_rollback_entries"=2000 SCOPE=SPFILE;
    EXIT;
    EOF
  register: _sec_1_8_fix
  become: true
  become_user: "{{ oracle_os_user }}"
  when:
    - not _sec_1_8_compliant
    - oracle_configuration_check_remediate | bool
  tags: [oracle_configuration_check, sec_conf, sec_1_8]

# REPORT: remove this task to disable reporting
- name: "1.8 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _sec_report: "{{ _sec_report | default([]) + [{'id': '1.8', 'name': '_cleanup_rollback_entries', 'status': 'PASS' if _sec_1_8_compliant else 'FAIL', 'fixed': _sec_1_8_fix is defined and _sec_1_8_fix is changed}] }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_8]

---
# 5.2 - DBA_REGISTRY Components — CHECK ONLY
# PASS: all components VALID
# FAIL: one or more components not VALID
# Fix: complex — DB version specific (catbundle, catupgrd, etc.) — see MOS Doc ID 2523682.1

- name: "5.2 - [CHECK] Query DBA_REGISTRY for invalid components"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF
    SELECT comp_name || '|' || version || '|' || status
    FROM dba_registry
    WHERE status != 'VALID';
    EXIT;
    EOF
  register: _sec_5_2_result
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_op, sec_5_2]

- name: "5.2 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _sec_5_2_invalid: >-
      {{
        _sec_5_2_result.stdout_lines
        | map('trim') | reject('equalto', '') | list
      }}
    _sec_5_2_compliant: >-
      {{
        _sec_5_2_result.stdout_lines
        | map('trim') | reject('equalto', '') | list | length == 0
      }}
  tags: [oracle_configuration_check, sec_op, sec_5_2]

# REPORT: remove this task to disable reporting
- name: "5.2 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _sec_report: "{{ _sec_report | default([]) + [{'id': '5.2', 'name': 'DBA_REGISTRY Components', 'status': 'PASS' if _sec_5_2_compliant else 'FAIL', 'fixed': false}] }}"
  tags: [oracle_configuration_check, sec_op, sec_5_2]

---
# 1.7 - DB Logon Delay
# 11.2.0.1-11.2.0.4: event "28401 trace name context forever, level 1"
# 12.1.0.2+:         _sys_logon_delay=0
# Both fixes use SCOPE=SPFILE; DB restart required (handled by restart_db.yml)

- name: "1.7 - [CHECK] Query event parameter"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF TRIMOUT ON TRIMSPOOL ON
    SELECT NVL(value, '') FROM v$parameter WHERE name = 'event';
    EXIT;
    EOF
  register: _sec_1_7_event_raw
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

- name: "1.7 - [CHECK] Query _sys_logon_delay"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF TRIMOUT ON TRIMSPOOL ON
    SELECT max(ksppstvl) FROM x$ksppi a, x$ksppsv b
    WHERE a.indx = b.indx AND ksppinm = '_sys_logon_delay';
    EXIT;
    EOF
  register: _sec_1_7_delay_raw
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

- name: "1.7 - [CHECK] Extract logon delay values"
  ansible.builtin.set_fact:
    _sec_1_7_event: "{{ _sec_1_7_event_raw.stdout | trim }}"
    _sec_1_7_logon_delay: "{{ _sec_1_7_delay_raw.stdout | trim | int }}"
    _sec_1_7_is_12plus: "{{ oracle_db_version | int >= 12 }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

- name: "1.7 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _sec_1_7_compliant: >-
      {{
        (_sec_1_7_is_12plus and _sec_1_7_logon_delay == 0) or
        (not _sec_1_7_is_12plus and '28401' in _sec_1_7_event)
      }}
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

- name: "1.7 - [FIX] Set _sys_logon_delay=0 in spfile (12.1.0.2+)"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    ALTER SYSTEM SET "_sys_logon_delay"=0 SCOPE=SPFILE;
    EXIT;
    EOF
  register: _sec_1_7_fix_12
  become: true
  become_user: "{{ oracle_os_user }}"
  when:
    - not _sec_1_7_compliant
    - oracle_configuration_check_remediate | bool
    - _sec_1_7_is_12plus
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

- name: "1.7 - [FIX] Set event 28401 in spfile (11.2)"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    ALTER SYSTEM SET EVENT='28401 trace name context forever, level 1' SCOPE=SPFILE;
    EXIT;
    EOF
  register: _sec_1_7_fix_11
  become: true
  become_user: "{{ oracle_os_user }}"
  when:
    - not _sec_1_7_compliant
    - oracle_configuration_check_remediate | bool
    - not _sec_1_7_is_12plus
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

# REPORT: remove this task to disable reporting
- name: "1.7 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _sec_report: "{{ _sec_report | default([]) + [{'id': '1.7', 'name': 'DB Logon Delay', 'status': 'PASS' if _sec_1_7_compliant else 'FAIL', 'fixed': (_sec_1_7_fix_12 is defined and _sec_1_7_fix_12 is changed) or (_sec_1_7_fix_11 is defined and _sec_1_7_fix_11 is changed)}] }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_7]

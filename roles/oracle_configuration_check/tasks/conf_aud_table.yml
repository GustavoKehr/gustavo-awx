---
# 1.1 - AUD$ Table
# PASS: audit_trail=none OR AUD$ stored outside SYSTEM/SYSAUX tablespace
# FAIL: audit_trail=DB AND AUD$ in SYSTEM or SYSAUX tablespace

- name: "1.1 - [CHECK] Query audit_trail parameter"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF TRIMOUT ON TRIMSPOOL ON
    SELECT value FROM v$parameter WHERE name = 'audit_trail';
    EXIT;
    EOF
  register: _sec_1_1_audit_trail_raw
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

- name: "1.1 - [CHECK] Query AUD$ tablespace"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF TRIMOUT ON TRIMSPOOL ON
    SELECT NVL(MAX(tablespace_name), 'NONE')
    FROM dba_segments WHERE segment_name = 'AUD$' AND owner = 'SYS';
    EXIT;
    EOF
  register: _sec_1_1_aud_ts_raw
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

- name: "1.1 - [CHECK] Determine AUD$ compliance"
  ansible.builtin.set_fact:
    _sec_1_1_audit_trail: "{{ _sec_1_1_audit_trail_raw.stdout | trim | lower }}"
    _sec_1_1_aud_ts: "{{ _sec_1_1_aud_ts_raw.stdout | trim | upper }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

- name: "1.1 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _sec_1_1_compliant: >-
      {{
        _sec_1_1_audit_trail == 'none' or
        _sec_1_1_aud_ts not in ['SYSTEM', 'SYSAUX']
      }}
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

- name: "1.1 - [FIX] Move AUD$ to {{ oracle_audit_tablespace }}"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET SERVEROUTPUT ON
    BEGIN
      DBMS_AUDIT_MGMT.SET_AUDIT_TRAIL_LOCATION(
        AUDIT_TRAIL_TYPE           => DBMS_AUDIT_MGMT.AUDIT_TRAIL_AUD_STD,
        AUDIT_TRAIL_LOCATION_VALUE => '{{ oracle_audit_tablespace }}'
      );
      DBMS_OUTPUT.PUT_LINE('CHANGED');
    END;
    /
    EXIT;
    EOF
  register: _sec_1_1_fix
  changed_when: "'CHANGED' in _sec_1_1_fix.stdout"
  become: true
  become_user: "{{ oracle_os_user }}"
  when:
    - not _sec_1_1_compliant
    - oracle_configuration_check_remediate | bool
    - _sec_1_1_audit_trail != 'none'
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

# REPORT: remove this task to disable reporting
- name: "1.1 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _sec_report: "{{ _sec_report | default([]) + [{'id': '1.1', 'name': 'AUD$ Table', 'status': 'PASS' if _sec_1_1_compliant else 'FAIL', 'fixed': _sec_1_1_fix is defined and _sec_1_1_fix is changed}] }}"
  tags: [oracle_configuration_check, sec_conf, sec_1_1]

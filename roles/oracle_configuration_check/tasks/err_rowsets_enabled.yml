---
# 2.1 - _rowsets_enabled
# PASS: _rowsets_enabled=false
# FAIL: _rowsets_enabled=true (default in 12c+)
# Fix: scope=spfile; DB restart handled by restart_db.yml

- name: "2.1 - [CHECK] Query _rowsets_enabled"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF ECHO OFF
    SELECT max(ksppstvl) FROM x$ksppi a, x$ksppsv b
    WHERE a.indx = b.indx AND ksppinm = '_rowsets_enabled';
    EXIT;
    EOF
  register: _sec_2_1_result
  changed_when: false
  become: true
  become_user: "{{ oracle_os_user }}"
  tags: [oracle_configuration_check, sec_err, sec_2_1]

- name: "2.1 - [CHECK] Evaluate compliance"
  ansible.builtin.set_fact:
    _sec_2_1_value: "{{ _sec_2_1_result.stdout | trim | lower }}"
    _sec_2_1_compliant: "{{ _sec_2_1_result.stdout | trim | lower == 'false' }}"
  tags: [oracle_configuration_check, sec_err, sec_2_1]

- name: "2.1 - [FIX] Set _rowsets_enabled=false in spfile"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    ALTER SYSTEM SET "_rowsets_enabled"=FALSE SCOPE=SPFILE;
    EXIT;
    EOF
  register: _sec_2_1_fix
  become: true
  become_user: "{{ oracle_os_user }}"
  when:
    - not _sec_2_1_compliant
    - oracle_configuration_check_remediate | bool
  tags: [oracle_configuration_check, sec_err, sec_2_1]

# REPORT: remove this task to disable reporting
- name: "2.1 - [REPORT] Store result"
  ansible.builtin.set_fact:
    _sec_report: "{{ _sec_report | default([]) + [{'id': '2.1', 'name': '_rowsets_enabled', 'status': 'PASS' if _sec_2_1_compliant else 'FAIL', 'fixed': _sec_2_1_fix is defined and _sec_2_1_fix is changed}] }}"
  tags: [oracle_configuration_check, sec_err, sec_2_1]

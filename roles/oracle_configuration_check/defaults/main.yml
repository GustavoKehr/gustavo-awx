---
oracle_sid: "{{ oracle_sid }}"
oracle_home: "/oracle/{{ oracle_sid }}/19.0.0"
oracle_grid_home: ""
oracle_base: "/oracle/{{ oracle_sid }}"
oracle_os_user: "oracle"
oracle_os_group: "oinstall"
oracle_db_version: "19"

oracle_security_remediate: true
oracle_configuration_check_remediate: true   # alias used by all FIX tasks; override via AWX survey
oracle_security_allow_restart: false
oracle_generate_report: true  # set false to skip report output; remove report.yml import to remove completely

# 1.1 AUD$ Table
oracle_audit_tablespace: "TS_AUDIT_DAT01"

# 1.2 DBA Role
oracle_dba_role_approved_users: []

# 2.4 Min Free Memory
oracle_min_free_kbytes: 524288
oracle_loopback_mtu: 16436

# 2.5 Listener.log
oracle_listener_log_path: "{{ oracle_base }}/diag/tnslsnr/{{ inventory_hostname | upper }}/listener/trace/listener.log"
oracle_listener_error_threshold: 10

# 3.2 Dual Archive Dest
#oracle_archive_dest_2: ""

# 4.2 PGA Limit
oracle_pga_max_size_gb: 2   # minimum _pga_max_size in GB; override via AWX survey

# 5.1 User Account Lock
oracle_app_profiles: []

# 5.3 OS Watcher
oracle_osw_path: "/home/oracle/oswbb"
oracle_osw_interval: 30
oracle_osw_archive_hours: 720

# 4.5 SGA/PGA Memory Sizing (percentages of total system RAM)
oracle_sga_pct_min: 20     # PASS floor: sga_target must be >= this % of RAM
oracle_sga_pct_max: 50     # PASS ceiling: sga_target must be <= this % of RAM
oracle_sga_pct_target: 40  # value set by FIX when out of range
oracle_pga_pct_min: 10     # PASS floor: pga_aggregate_target must be >= this % of RAM
oracle_pga_pct_max: 40     # PASS ceiling: pga_aggregate_target must be <= this % of RAM
oracle_pga_pct_target: 20  # value set by FIX when out of range

# 5.7 AWR
oracle_awr_retention_days: 35
oracle_awr_interval_min: 20

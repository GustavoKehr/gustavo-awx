---
- name: "Build db_users from flat survey vars when list not provided"
  ansible.builtin.set_fact:
    db_users:
      - username: "{{ pg_username }}"
        password: "{{ pg_user_password | default('') }}"
        state: "{{ pg_user_state | default('present') }}"
        databases: "{{ pg_target_databases | default('appdb') }}"
        privileges: "{{ pg_privileges | default('CONNECT') }}"
        role_attr_flags: "{{ pg_role_attr_flags | default('LOGIN') }}"
        revoke: "{{ pg_revoke_access | default(false) | bool }}"
        manage_databases: "{{ pg_manage_databases | default(false) | bool }}"
        allowed_ips: >-
          {{
            (pg_allowed_ips | default(''))
            | string | split(',')
            | map('trim') | reject('equalto', '') | list
          }}
  when:
    - db_users | default([]) | length == 0
    - pg_username | default('') | length > 0
  tags: [postgres, postgres_users]

- name: "Validate db_users list is not empty"
  ansible.builtin.assert:
    that:
      - db_users | length > 0
    fail_msg: "db_users list is empty. Provide at least one user entry."
  tags: [postgres, postgres_users, postgres_users_validate]

- name: "Manage each PostgreSQL user"
  ansible.builtin.include_tasks: manage_user.yml
  loop: "{{ db_users }}"
  loop_control:
    loop_var: db_user
    label: "{{ db_user.username }}"
  tags: [postgres, postgres_users]

---
- name: "Instalar bibliotecas de compatibilidade críticas para RHEL 9"
  ansible.builtin.dnf:
    name:
      - libnsl
      - libnsl.i686
      - libxcrypt-compat
      - glibc-devel
    state: present
  become: yes
  tags: [install, libs]

- name: "Descompactar Binários (Obrigatório após falha de compilação)"
  ansible.builtin.unarchive:
    src: "/tmp/oracle_sig.zip"
    dest: "{{ BASE_DIR }}/19.3.0"
    remote_src: yes
    owner: oracle
    group: oinstall
  tags: [install, unzip_binary]

- name: "Limpar oraInventory antigos"
  ansible.builtin.shell: "rm -rf {{ BASE_DIR }}/oraInventory/* {{ BASE_DIR }}/19.3.0/*"
  become: yes
  tags: [install, clean_all]

- name: "Executar Instalação Silenciosa"
  ansible.builtin.shell:
    cmd: >
      ./runInstaller -silent 
      -responseFile {{ BASE_DIR }}/19.3.0/install/response/db_install.rsp 
      -ignorePrereq 
      -waitforcompletion 
      oracle.install.option=INSTALL_DB_SWONLY 
      ORACLE_HOSTNAME={{ ansible_hostname }} 
      UNIX_GROUP_NAME=oinstall 
      INVENTORY_LOCATION={{ BASE_DIR }}/oraInventory 
      SELECTED_LANGUAGES=en 
      ORACLE_HOME={{ BASE_DIR }}/19.3.0 
      ORACLE_BASE={{ BASE_DIR }} 
      oracle.install.db.InstallEdition=EE 
      oracle.install.db.OSDBA_GROUP=dba 
      oracle.install.db.OSBACKUPDBA_GROUP=dba 
      oracle.install.db.OSDGDBA_GROUP=dba 
      oracle.install.db.OSKMDBA_GROUP=kmdba 
      oracle.install.db.OSRACDBA_GROUP=dba 
      SECURITY_UPDATES_VIA_MYORACLESUPPORT=false 
      DECLINE_SECURITY_UPDATES=true
    chdir: "{{ BASE_DIR }}/19.3.0"
  become: yes
  become_user: oracle
  environment:
    CV_ASSUME_DISTID: "RHEL8"
    ORACLE_HOME: "{{ BASE_DIR }}/19.3.0"
    ORACLE_BASE: "{{ BASE_DIR }}"
  register: oracle_install_result
  failed_when: "'Successfully Setup Software' not in oracle_install_result.stdout"
  tags: [install, silent_installation]

- name: "Executar script de Root (orainstRoot.sh no novo caminho)"
  ansible.builtin.shell: "{{ BASE_DIR }}/oraInventory/orainstRoot.sh"
  become: yes
  tags: [install, instroot]

- name: "Executar script de Root (root.sh)"
  ansible.builtin.shell: "{{ BASE_DIR }}/19.3.0/root.sh"
  become: yes
  tags: [install, rootsh]

- name: "Executar scripts de Root (orainstRoot.sh)"
  ansible.builtin.shell: "/oracle/oraInventory/orainstRoot.sh"
  become: yes
  tags: [install, instroot]

- name: "Executar scripts de Root (root.sh)"
  ansible.builtin.shell: "{{ BASE_DIR }}/19.3.0/root.sh"
  become: yes
  tags: [install, rootsh]
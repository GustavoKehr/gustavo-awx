---
- name: "Validar existência do runInstaller"
  ansible.builtin.stat:
    path: "{{ oracle_home }}/runInstaller"
  register: runinstaller_stat
  become: yes
  tags: [install, validate]

- name: "Falhar se o runInstaller não existir"
  ansible.builtin.fail:
    msg: "runInstaller não encontrado em {{ oracle_home }}. Verifique o download e o unzip do binário."
  when: not runinstaller_stat.stat.exists
  tags: [install, validate]

- name: "Validar existência do response file"
  ansible.builtin.stat:
    path: "{{ oracle_rsp_file }}"
  register: rsp_stat
  become: yes
  tags: [install, validate]

- name: "Falhar se o response file não existir"
  ansible.builtin.fail:
    msg: "Response file não encontrado em {{ oracle_rsp_file }}."
  when: not rsp_stat.stat.exists
  tags: [install, validate]

- name: "Executar instalação silenciosa do Oracle 19c"
  ansible.builtin.shell: |
    ./runInstaller -silent \
      -responseFile {{ oracle_rsp_file }} \
      -ignorePrereq \
      -waitforcompletion
  args:
    chdir: "{{ oracle_home }}"
    executable: /bin/bash
  register: oracle_install_result
  become: yes
  become_user: oracle
  environment:
    CV_ASSUME_DISTID: "{{ oracle_cv_assume_distid }}"
    ORACLE_BASE: "{{ oracle_base }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_SID: "{{ INST }}"
    ORACLE_HOSTNAME: "{{ ansible_hostname }}"
    LD_LIBRARY_PATH: "{{ oracle_home }}/lib:/usr/lib64:/lib64"
    PATH: "{{ oracle_home }}/bin:/usr/local/bin:/usr/bin:/bin"
  changed_when: >
    oracle_install_result.rc == 0 and
    (
      'Successfully Setup Software' in (oracle_install_result.stdout | default('')) or
      'The installation of Oracle Database was successful' in (oracle_install_result.stdout | default('')) or
      'Successfully Setup Software with warning(s)' in (oracle_install_result.stdout | default('')) or
      oracle_install_result.rc == 0
    )
  tags: [install, silent_installation]

- name: "Exibir saída resumida da instalação"
  ansible.builtin.debug:
    msg:
      - "RC: {{ oracle_install_result.rc }}"
      - "STDOUT: {{ oracle_install_result.stdout_lines | default([]) }}"
      - "STDERR: {{ oracle_install_result.stderr_lines | default([]) }}"
  tags: [install, silent_installation]

- name: "Validar existência do script orainstRoot.sh"
  ansible.builtin.stat:
    path: "{{ oracle_inventory }}/orainstRoot.sh"
  register: orainstroot_stat
  become: yes
  tags: [install, root_scripts]

- name: "Executar orainstRoot.sh"
  ansible.builtin.shell: "{{ oracle_inventory }}/orainstRoot.sh"
  args:
    executable: /bin/bash
  become: yes
  when:
    - oracle_install_result.rc == 0
    - orainstroot_stat.stat.exists
  tags: [install, root_scripts]

- name: "Validar existência do script root.sh"
  ansible.builtin.stat:
    path: "{{ oracle_home }}/root.sh"
  register: rootsh_stat
  become: yes
  tags: [install, root_scripts]

- name: "Executar root.sh"
  ansible.builtin.shell: "{{ oracle_home }}/root.sh"
  args:
    executable: /bin/bash
  become: yes
  when:
    - oracle_install_result.rc == 0
    - rootsh_stat.stat.exists
  tags: [install, root_scripts]
---
- name: "Baixar Binário do Oracle 19.3 via HTTP"
  ansible.builtin.get_url:
    url: "http://192.168.137.138:8080/LINUX.X64_193000_db_home.zip"
    dest: "/tmp/oracle_sig.zip"
    mode: '0644'
    timeout: 1200
  tags: [install, download_binary]

- name: "Instalar bibliotecas de compatibilidade críticas para RHEL 9"
  ansible.builtin.dnf:
    name:
      - libnsl
      - libnsl.i686
      - ncurses-libs.i686
      - libxcrypt-compat # ESSENCIAL para evitar erro de makefile no RHEL 9
    state: present
  become: yes
  tags: [install, libs]

- name: "Limpar inventário para nova tentativa (Evitar INS-32035)"
  ansible.builtin.shell: "rm -rf /oracle/oraInventory/*"
  become: yes
  tags: [install, clean_inventory]

- name: "Garantir que o diretório ORACLE_HOME existe"
  ansible.builtin.file:
    path: "{{ BASE_DIR }}/19.3.0"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0755'
  tags: [install, home_dir]

- name: "Descompactar Binários no ORACLE_HOME"
  ansible.builtin.unarchive:
    src: "/tmp/oracle_sig.zip"
    dest: "{{ BASE_DIR }}/19.3.0"
    remote_src: yes
    owner: oracle
    group: oinstall
  tags: [install, unzip_binary]

- name: "Gerar Arquivo de Resposta a partir do Template"
  ansible.builtin.template:
    src: db_install.rsp.j2
    dest: "/tmp/db_install.rsp"
    owner: oracle
    group: oinstall
    mode: '0644'
  tags: [install, rsp_file]

- name: "Executar Instalação Silenciosa do Software Oracle"
  ansible.builtin.shell:
    cmd: "./runInstaller -silent -waitforcompletion -ignorePrereqFailure -responseFile /tmp/db_install.rsp"
    chdir: "{{ BASE_DIR }}/19.3.0"
  become: yes
  become_user: oracle
  environment:
    CV_ASSUME_DISTID: "OEL8.4" 
  register: oracle_install_result
  failed_when: "'Successfully Setup Software' not in oracle_install_result.stdout"
  tags: [install, silent_installation]

- name: "Executar scripts de Root (orainstRoot.sh)"
  ansible.builtin.shell: "/oracle/oraInventory/orainstRoot.sh"
  become: yes
  tags: [install, instroot]

- name: "Executar scripts de Root (root.sh)"
  ansible.builtin.shell: "{{ BASE_DIR }}/19.3.0/root.sh"
  become: yes
  tags: [install, rootsh]
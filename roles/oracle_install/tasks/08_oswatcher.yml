---
# Phase 8 — OS Watcher Installation
# Copies oswbb tar from oracle_software_src (controller/EE) to target and installs.
# Idempotent: skips if startOSWbb.sh already present at oracle_osw_path.

- name: "OSW | Check if OS Watcher already installed"
  ansible.builtin.stat:
    path: "{{ oracle_osw_path }}/startOSWbb.sh"
  register: _osw_installed
  tags: oracle_oswatcher

- name: "OSW | Check tar source exists on controller"
  ansible.builtin.stat:
    path: "{{ oracle_software_src }}/{{ oracle_oswatcher_tar }}"
  delegate_to: localhost
  become: false
  register: _osw_tar_stat
  when: not _osw_installed.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Abort if tar not found on controller"
  ansible.builtin.fail:
    msg: >-
      OS Watcher tar not found: {{ oracle_software_src }}/{{ oracle_oswatcher_tar }} on controller.
      Upload the file to {{ oracle_software_src }} before running this phase.
  when:
    - not _osw_installed.stat.exists
    - not _osw_tar_stat.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Copy tar from controller to target"
  ansible.builtin.copy:
    src: "{{ oracle_software_src }}/{{ oracle_oswatcher_tar }}"
    dest: "/tmp/{{ oracle_oswatcher_tar }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when: not _osw_installed.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Create install directory"
  ansible.builtin.file:
    path: "{{ oracle_osw_path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: "0750"
  when: not _osw_installed.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Extract tar to install directory"
  ansible.builtin.shell: |
    cd "{{ oracle_osw_path }}"
    tar -xf /tmp/{{ oracle_oswatcher_tar }} --strip-components=1
  become: true
  become_user: oracle
  when: not _osw_installed.stat.exists
  changed_when: true
  tags: oracle_oswatcher

- name: "OSW | Remove transferred tar from /tmp"
  ansible.builtin.file:
    path: "/tmp/{{ oracle_oswatcher_tar }}"
    state: absent
  become: true
  when: not _osw_installed.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Fix ownership"
  ansible.builtin.file:
    path: "{{ oracle_osw_path }}"
    state: directory
    owner: oracle
    group: oinstall
    recurse: true
  when: not _osw_installed.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Verify installation"
  ansible.builtin.stat:
    path: "{{ oracle_osw_path }}/startOSWbb.sh"
  register: _osw_verify
  tags: oracle_oswatcher

- name: "OSW | Abort if startOSWbb.sh not found after install"
  ansible.builtin.fail:
    msg: >-
      startOSWbb.sh not found at {{ oracle_osw_path }} after extraction.
      Check if {{ oracle_oswatcher_tar }} has the expected oswbb structure.
  when: not _osw_verify.stat.exists
  tags: oracle_oswatcher

- name: "OSW | Deploy systemd service unit"
  ansible.builtin.copy:
    dest: /etc/systemd/system/oswatcher.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Oracle OS Watcher (OSWbb)
      After=network.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      User=oracle
      Group=oinstall
      WorkingDirectory={{ oracle_osw_path }}
      ExecStart=/bin/bash {{ oracle_osw_path }}/startOSWbb.sh {{ oracle_osw_interval }} {{ oracle_osw_archive_hours }}
      ExecStop=/bin/bash {{ oracle_osw_path }}/stopOSWbb.sh

      [Install]
      WantedBy=multi-user.target
  tags: oracle_oswatcher

- name: "OSW | Reload systemd daemon"
  ansible.builtin.systemd:
    daemon_reload: true
  tags: oracle_oswatcher

- name: "OSW | Enable and start oswatcher service"
  ansible.builtin.systemd:
    name: oswatcher
    enabled: true
    state: started
  tags: oracle_oswatcher

- name: "OSW | Installation summary"
  ansible.builtin.debug:
    msg: "OS Watcher installed at {{ oracle_osw_path }} and running via systemd oswatcher.service"
  tags: oracle_oswatcher

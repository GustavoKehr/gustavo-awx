---
- name: "Criar Volume Group (VG) dinâmico"
  community.general.lvg:
    vg: "{{ VG_NAME }}"
    pvs: "{{ PV_NAME }}"
  become: yes
  tags: [storage, lvm]

- name: "TASK 1: Criar Logical Volumes (LVs)"
  community.general.lvol:
    vg: "{{ VG_NAME }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.size }}"
    force: yes
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]

- name: "TASK 2: Formatar Filesystems (XFS)"
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    force: yes
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]

- name: "TASK 3: Criar Diretórios de Montagem"
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]

- name: "TASK 4: Montar Volumes"
  ansible.builtin.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    fstype: xfs
    opts: defaults,noatime
    state: mounted
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]
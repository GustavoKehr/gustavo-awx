---
- name: "Checar se o disco já pertence a algum volume group"
  ansible.builtin.command: "pvs --noheadings -o vg_name {{ oracle_disk_device }}"
  register: pv_vg_check
  changed_when: false
  failed_when: false
  become: yes
  tags: [storage, vg]

- name: "Exibir status atual do disco no LVM"
  ansible.builtin.debug:
    msg:
      - "Disco informado: {{ oracle_disk_device }}"
      - "VG encontrado no PV: {{ pv_vg_check.stdout | trim }}"
  tags: [storage, vg, debug]

- name: "Falhar se o disco já estiver em outro VG diferente do esperado"
  ansible.builtin.fail:
    msg: >-
      O disco {{ oracle_disk_device }} já pertence ao volume group
      '{{ pv_vg_check.stdout | trim }}' e não ao VG esperado '{{ VG_NAME }}'.
      Ajuste o Survey ou escolha outro disco.
  when:
    - pv_vg_check.stdout | trim != ""
    - pv_vg_check.stdout | trim != VG_NAME
  tags: [storage, vg]

- name: "Criar ou garantir Volume Group {{ VG_NAME }}"
  community.general.lvg:
    vg: "{{ VG_NAME }}"
    pvs: "{{ oracle_disk_device }}"
  become: yes
  when:
    - pv_vg_check.stdout | trim == "" or pv_vg_check.stdout | trim == VG_NAME
  tags: [storage, vg]

- name: "Coletar Logical Volumes existentes"
  ansible.builtin.command: "lvs --noheadings -o lv_name {{ VG_NAME }}"
  register: existing_lvs
  changed_when: false
  failed_when: false
  become: yes
  tags: [storage, lv]

- name: "Criar Logical Volumes somente se ainda não existirem"
  community.general.lvol:
    vg: "{{ VG_NAME }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.size }}"
  loop: "{{ oracle_lvs }}"
  when: item.lv_name not in (existing_lvs.stdout_lines | map('trim') | list)
  become: yes
  tags: [storage, lv]

- name: "Verificar se os volumes já estão montados"
  ansible.builtin.command: "grep -w {{ item.mount_path }} /proc/mounts"
  loop: "{{ oracle_lvs }}"
  register: mount_check
  failed_when: false
  changed_when: false
  become: yes
  tags: [storage, fs]

- name: "Verificar tipo de filesystem atual"
  ansible.builtin.command: "blkid -o value -s TYPE /dev/{{ VG_NAME }}/{{ item.lv_name }}"
  loop: "{{ oracle_lvs }}"
  register: fs_check
  failed_when: false
  changed_when: false
  become: yes
  tags: [storage, fs]

- name: "Formatar filesystem XFS somente se ainda não existir"
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    force: no
  loop: "{{ oracle_lvs }}"
  loop_control:
    index_var: idx
  when:
    - fs_check.results[idx].rc != 0 or (fs_check.results[idx].stdout | trim) == ""
  become: yes
  tags: [storage, fs]

- name: "Criar diretórios de montagem"
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, fs]

- name: "Montar volumes e persistir no /etc/fstab"
  ansible.builtin.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    fstype: xfs
    opts: defaults,noatime
    state: mounted
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]
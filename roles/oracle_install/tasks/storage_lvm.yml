---
- name: "Criar Volume Group {{ VG_NAME }}"
  community.general.lvg:
    vg: "{{ VG_NAME }}"
    pvs: "{{ oracle_disk_device }}"
  become: yes
  tags: [storage, vg]

- name: "Criar Logical Volumes conforme definição de projeto"
  community.general.lvol:
    vg: "{{ VG_NAME }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.size }}"
    force: yes
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lv]

- name: "Formatar Filesystems (XFS)"
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    force: yes
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, fs]

- name: "Criar diretórios de montagem e permissões"
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, fs]

- name: "Montar Volumes"
  ansible.builtin.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    fstype: xfs
    opts: defaults,noatime
    state: mounted
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]
---
- name: "Definir nome do VG a partir da instância"
  ansible.builtin.set_fact:
    VG_NAME: "{{ INST }}"
  tags: [storage, vg]

- name: "Checar se o disco já pertence a algum VG"
  ansible.builtin.command: "pvs --noheadings -o vg_name {{ oracle_disk_device }}"
  register: pv_vg_check
  changed_when: false
  failed_when: false
  become: yes
  tags: [storage, vg]

- name: "Exibir status do disco"
  ansible.builtin.debug:
    msg:
      - "Disco: {{ oracle_disk_device }}"
      - "VG atual: {{ pv_vg_check.stdout | trim }}"
      - "VG desejado: {{ VG_NAME }}"
  tags: [storage, vg, debug]

# 👇 Aqui está a lógica principal
- name: "Criar VG apenas se o disco não estiver em nenhum VG"
  community.general.lvg:
    vg: "{{ VG_NAME }}"
    pvs: "{{ oracle_disk_device }}"
  when: pv_vg_check.stdout | trim == ""
  become: yes
  tags: [storage, vg]

# 👇 Se já estiver em VG (qualquer um), não faz nada e segue
- name: "Pular criação de VG (já existe)"
  ansible.builtin.debug:
    msg: "Disco já pertence a um VG, pulando criação"
  when: pv_vg_check.stdout | trim != ""
  tags: [storage, vg]

# ========================
# LVs
# ========================

- name: "Coletar LVs existentes"
  ansible.builtin.command: "lvs --noheadings -o lv_name {{ VG_NAME }}"
  register: existing_lvs
  changed_when: false
  failed_when: false
  become: yes
  tags: [storage, lv]

- name: "Criar LVs somente se não existirem"
  community.general.lvol:
    vg: "{{ VG_NAME }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.size }}"
  loop: "{{ oracle_lvs }}"
  when: item.lv_name not in (existing_lvs.stdout_lines | map('trim') | list)
  become: yes
  tags: [storage, lv]

# ========================
# Filesystem
# ========================

- name: "Checar filesystem existente"
  ansible.builtin.command: "blkid -o value -s TYPE /dev/{{ VG_NAME }}/{{ item.lv_name }}"
  loop: "{{ oracle_lvs }}"
  register: fs_check
  failed_when: false
  changed_when: false
  become: yes
  tags: [storage, fs]

- name: "Formatar XFS apenas se necessário"
  community.general.filesystem:
    fstype: xfs
    dev: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
  loop: "{{ oracle_lvs }}"
  loop_control:
    index_var: idx
  when: fs_check.results[idx].stdout | trim == ""
  become: yes
  tags: [storage, fs]


# ========================
# Mount
# ========================

- name: "Criar diretórios"
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, fs]

- name: "Montar volumes e persistir no fstab"
  ansible.builtin.mount:
    path: "{{ item.mount_path }}"
    src: "/dev/{{ VG_NAME }}/{{ item.lv_name }}"
    fstype: xfs
    opts: defaults,noatime
    state: mounted
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]
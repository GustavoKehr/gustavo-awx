---
- name: "Criar Volume Group {{ VG_NAME }}"
  community.general.lvg:
    vg: "{{ VG_NAME }}"
    pvs: "{{ oracle_disk_device }}"
  tags: [storage, vg]

- name: "Criar Logical Volumes conforme definição de projeto"
  community.general.lvol:
    vg: "{{ VG_NAME }}"
    lv: "{{ item.lv_name }}"
    size: "{{ item.size }}"
  loop: "{{ oracle_lvs }}"
  tags: [storage, lv]

- name: "Criar diretórios de montagem"
  ansible.builtin.file:
    path: "{{ item.mount_path }}"
    state: directory
    mode: '0755'
  loop: "{{ oracle_lvs }}"
  tags: [storage, fs]

- name: "TASK 4: Criar Diretórios de Montagem"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]

- name: "TASK 5: Montar Volumes"
  ansible.builtin.mount:
    path: "{{ item.path }}"
    src: "/dev/{{ VG_NAME }}/lv_{{ item.name }}"
    fstype: xfs
    opts: defaults,noatime
    state: mounted
  loop: "{{ oracle_lvs }}"
  become: yes
  tags: [storage, lvm]
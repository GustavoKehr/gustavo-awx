---
- name: "INSTALL | Unzip Oracle installer into ORACLE_HOME"
  ansible.builtin.shell: |
    unzip -q "{{ oracle_software_dst }}/{{ oracle_installer_zip }}" -d "{{ oracle_home }}"
  args:
    creates: "{{ oracle_home }}/runInstaller"
  become: true
  become_user: oracle
  tags: oracle_install_sw

- name: "INSTALL | Back up bundled OPatch"
  ansible.builtin.shell: |
    mv "{{ oracle_home }}/OPatch" "{{ oracle_home }}/OPatchOLD"
  args:
    creates: "{{ oracle_home }}/OPatchOLD"
  become: true
  become_user: oracle
  tags: oracle_install_sw

- name: "INSTALL | Install new OPatch"
  ansible.builtin.shell: |
    cp -r "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}/OPatch" "{{ oracle_home }}/OPatch"
    chown -R oracle:oinstall "{{ oracle_home }}/OPatch"
  args:
    creates: "{{ oracle_home }}/OPatch"
  become: true
  tags: oracle_install_sw

- name: "INSTALL | Deploy runInstaller response file"
  ansible.builtin.template:
    src: db_install.rsp.j2
    dest: "{{ oracle_software_dst }}/db_install.rsp"
    owner: oracle
    group: oinstall
    mode: "0640"
  tags: oracle_install_sw

- name: "INSTALL | Remove stale .patch_storage if install not yet complete"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    rm -rf "{{ oracle_home }}/.patch_storage"
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Run silent Oracle software installation"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    export CV_ASSUME_DISTID=RHEL8
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_HOME={{ oracle_home }}
    {{ oracle_home }}/runInstaller \
      -applyRU {{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/{{ oracle_ru_subpath }} \
      -applyOneOffs {{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/{{ oracle_oneoff_subpath }} \
      -silent \
      -responseFile {{ oracle_software_dst }}/db_install.rsp \
      -ignorePrereq \
      -waitforcompletion
  become: true
  become_user: oracle
  register: oracle_installer_result
  failed_when:
    - oracle_installer_result.rc is defined
    - oracle_installer_result.rc not in [0, 6]
    - "'Successfully Setup Software' not in oracle_installer_result.stdout"
  changed_when: oracle_installer_result.changed
  tags: oracle_install_sw

- name: "INSTALL | Run root.sh (required post-install step)"
  ansible.builtin.shell: |
    grep -q "{{ oracle_home }}" /etc/oratab 2>/dev/null && exit 0
    "{{ oracle_home }}/root.sh"
  changed_when: false
  tags: oracle_install_sw

---
- name: "Transferir RPM do Preinstall do Servidor AWX para o Destino"
  ansible.builtin.get_url:
    url: "{{ oracle_preinstall_rpm_url }}"
    dest: "{{ oracle_preinstall_rpm_dest }}"
    mode: '0644'
    timeout: 300
  become: yes
  tags: [pre_install, copy]

- name: "Instalar Oracle Preinstall (cria usuário oracle e grupos)"
  ansible.builtin.dnf:
    name: "{{ oracle_preinstall_rpm_dest }}"
    state: present
    disable_gpg_check: yes
  become: yes
  tags: [pre_install, packages]

- name: "Instalar dependências adicionais para Oracle 19c no RHEL9"
  ansible.builtin.dnf:
    name: "{{ oracle_required_packages }}"
    state: present
  become: yes
  tags: [pre_install, packages, rhel9_fix]

- name: "Validar presença de bibliotecas libnsl no sistema"
  ansible.builtin.shell: |
    set -o pipefail
    ldconfig -p | grep libnsl || true
  args:
    executable: /bin/bash
  register: libnsl_check
  changed_when: false
  become: yes
  tags: [pre_install, validate]

- name: "Exibir bibliotecas libnsl encontradas"
  ansible.builtin.debug:
    var: libnsl_check.stdout_lines
  tags: [pre_install, validate]

- name: "Garantir que o diretório base do Oracle existe"
  ansible.builtin.file:
    path: "{{ oracle_base_root }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  become: yes
  tags: [pre_install, setup_dirs]

- name: "Garantir que o diretório ORACLE_BASE existe"
  ansible.builtin.file:
    path: "{{ oracle_base }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  become: yes
  tags: [pre_install, setup_dirs]

- name: "Garantir que o diretório ORACLE_HOME existe"
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  become: yes
  tags: [install, setup_dirs]

- name: "Baixar binário do Oracle Database via HTTP"
  ansible.builtin.get_url:
    url: "{{ oracle_db_zip_url }}"
    dest: "{{ oracle_db_zip_dest }}"
    mode: '0644'
    timeout: 900
  become: yes
  tags: [install, download_bin]

- name: "Descompactar binário como usuário oracle"
  ansible.builtin.shell: |
    unzip -qo {{ oracle_db_zip_dest }} -d {{ oracle_home }}/
  args:
    creates: "{{ oracle_home }}/runInstaller"
    executable: /bin/bash
  become: yes
  become_user: oracle
  tags: [install, unzip_shell]

- name: "Remover ponteiro antigo do inventário"
  ansible.builtin.file:
    path: "/etc/oraInst.loc"
    state: absent
  become: yes
  tags: [pre_install, cleanup]

- name: "Remover oraInventory antigo para reinstalação limpa"
  ansible.builtin.file:
    path: "{{ oracle_inventory }}"
    state: absent
  become: yes
  tags: [pre_install, cleanup_inventory]

- name: "Recriar diretório do oraInventory"
  ansible.builtin.file:
    path: "{{ oracle_inventory }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  become: yes
  tags: [pre_install, inventory]

- name: "Garantir ownership recursivo do ORACLE_BASE"
  ansible.builtin.file:
    path: "{{ oracle_base }}"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
    recurse: yes
  become: yes
  tags: [pre_install, storage_perms]

- name: "Configurar variáveis de ambiente do usuário oracle"
  ansible.builtin.blockinfile:
    path: /home/oracle/.bash_profile
    create: yes
    marker: "# {mark} ANSIBLE MANAGED BLOCK - ORACLE ENV"
    block: |
      umask 0022
      TMOUT=1800
      ORACLE_BASE={{ oracle_base }}; export ORACLE_BASE
      ORACLE_HOME={{ oracle_home }}; export ORACLE_HOME
      ORACLE_SID={{ INST }}; export ORACLE_SID
      ORACLE_HOSTNAME={{ ansible_hostname }}; export ORACLE_HOSTNAME
      CV_ASSUME_DISTID={{ oracle_cv_assume_distid }}; export CV_ASSUME_DISTID
      LD_LIBRARY_PATH=$ORACLE_HOME/lib:/usr/lib64:/lib64; export LD_LIBRARY_PATH
      PATH=$ORACLE_HOME/bin:/usr/local/bin:/usr/bin:/bin; export PATH
  become: yes
  tags: [pre_install, env]

- name: "Garantir pasta temporária do Ansible para o usuário oracle"
  ansible.builtin.file:
    path: "/home/oracle/.ansible/tmp"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0755'
  become: yes
  tags: [pre_install, ansible_tmp]

- name: "Garantir diretório do response file"
  ansible.builtin.file:
    path: "{{ oracle_home }}/install/response"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  become: yes
  tags: [install, setup_rsp]

- name: "Gerar response file a partir do template"
  ansible.builtin.template:
    src: "db_install.rsp.j2"
    dest: "{{ oracle_rsp_file }}"
    owner: oracle
    group: oinstall
    mode: '0644'
  become: yes
  tags: [install, setup_rsp]
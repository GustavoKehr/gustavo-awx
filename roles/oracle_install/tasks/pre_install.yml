---
- name: "Transferir RPM do Preinstall do Servidor AWX para o Destino"
  ansible.builtin.get_url:
    url: "http://192.168.137.138:8080/oracle-database-preinstall-19c-1.0-1.el9.x86_64.rpm"
    dest: "/tmp/oracle-database-preinstall-19c-1.0-1.el9.x86_64.rpm"
    mode: '0644'
  tags: [pre_install, copy]

- name: "Instalar Oracle Preinstall (Cria usuário oracle e grupos)"
  ansible.builtin.dnf:
    name: "/tmp/oracle-database-preinstall-19c-1.0-1.el9.x86_64.rpm"
    state: present
    disable_gpg_check: yes
  tags: [pre_install, packages]

- name: "Garantir permissões na raiz do Oracle (/oracle)"
  ansible.builtin.file:
    path: "/oracle"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  tags: [pre_install, permissions]

- name: "Limpar rastro de inventário antigo (Pointer file /etc/oraInst.loc)"
  ansible.builtin.file:
    path: "/etc/oraInst.loc"
    state: absent
  tags: [pre_install, cleanup]

- name: "Criar o oraInventory dentro do ORACLE_BASE (Padrao Trabalho)"
  ansible.builtin.file:
    path: "{{ BASE_DIR }}/oraInventory"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0775'
  tags: [pre_install, inventory]

- name: "Aplicar chown no BASE_DIR (Rápido via Shell)"
  ansible.builtin.shell: "chown -R oracle:oinstall {{ BASE_DIR }}"
  become: yes
  tags: [pre_install, storage_perms]

- name: "Configurar variáveis de ambiente (.bash_profile)"
  ansible.builtin.blockinfile:
    path: /home/oracle/.bash_profile
    marker: "# {mark} ANSIBLE MANAGED BLOCK - ORACLE ENV"
    block: |
      export ORACLE_SID={{ INST }}
      export ORACLE_BASE={{ BASE_DIR }}
      export ORACLE_HOME={{ BASE_DIR }}/19.3.0
      export PATH=$ORACLE_HOME/bin:$PATH
      export LD_LIBRARY_PATH=$ORACLE_HOME/lib:/lib:/usr/lib
  tags: [pre_install, env]

- name: "Garantir permissões na pasta tmp do Ansible para o usuário oracle"
  ansible.builtin.file:
    path: "/home/oracle/.ansible/tmp"
    state: directory
    owner: oracle
    group: oinstall
    mode: '0755'
  tags: [pre_install, ansible_tmp]
---
- name: "Transferir RPM do Preinstall do Servidor AWX para o Destino"
  ansible.builtin.copy:
    src: "/opt/oracle_dist/oracle-database-preinstall-19c-1.0-1.el9.x86_64.rpm" # Nome exato agora
    dest: "/tmp/oracle-database-preinstall-19c.rpm"
    mode: '0644'
  tags: [pre_install, copy]

- name: "Instalar Oracle Preinstall (Cria usuário oracle)"
  ansible.builtin.dnf:
    name: "/tmp/oracle-database-preinstall-19c.rpm"
    state: present
    disable_gpg_check: yes
  tags: [pre_install, packages]

- name: "Ajustar Dono e Grupo da estrutura de diretórios"
  ansible.builtin.file:
    path: "{{ BASE_DIR }}"
    state: directory
    owner: oracle
    group: oinstall
    recurse: yes
  tags: [pre_install, permissions]
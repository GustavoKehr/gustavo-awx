---
# Copies Oracle software from AWX VM to oracle_software_dst on the target.
# Uses ansible.builtin.copy (transfers over established Ansible SSH connection,
# no separate rsync/SSH subprocess needed — works reliably in AWX EE containers).
#
# Installer zip + preinstall RPM: oracle_software_src (/opt/oracle)
# OPatch / RU / post-install patches: oracle_patches_src (/opt/patches)

- name: "TRANSFER | Copy Oracle installer zip"
  ansible.builtin.copy:
    src: "{{ oracle_software_src }}/{{ oracle_installer_zip }}"
    dest: "{{ oracle_software_dst }}/{{ oracle_installer_zip }}"
    owner: oracle
    group: oinstall
    mode: "0640"
  tags: oracle_transfer

- name: "TRANSFER | Copy OPatch replacement directory"
  ansible.builtin.copy:
    src: "{{ oracle_patches_src }}/{{ oracle_opatch_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}/"
    owner: oracle
    group: oinstall
    mode: preserve
  tags: oracle_transfer

- name: "TRANSFER | Copy RU + one-off patch directory ({{ oracle_ru_patch_dir }})"
  ansible.builtin.copy:
    src: "{{ oracle_patches_src }}/{{ oracle_ru_patch_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/"
    owner: oracle
    group: oinstall
    mode: preserve
  tags: oracle_transfer

- name: "TRANSFER | Copy post_patch1 directory ({{ oracle_post_patch1_dir }})"
  ansible.builtin.copy:
    src: "{{ oracle_patches_src }}/{{ oracle_post_patch1_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_post_patch1_dir }}/"
    owner: oracle
    group: oinstall
    mode: preserve
  when: oracle_post_patch1_enabled | bool
  tags: oracle_transfer

- name: "TRANSFER | Copy post-install patch directories (patch2, patch3)"
  ansible.builtin.copy:
    src: "{{ oracle_patches_src }}/{{ item }}/"
    dest: "{{ oracle_software_dst }}/{{ item }}/"
    owner: oracle
    group: oinstall
    mode: preserve
  loop:
    - "{{ oracle_post_patch2_dir }}"
    - "{{ oracle_post_patch3_dir }}"
  tags: oracle_transfer

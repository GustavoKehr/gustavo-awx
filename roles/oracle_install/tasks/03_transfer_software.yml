---
# Transfers Oracle software from the Ansible controller (EE) to oracle_software_dst on target.
# Uses ansible.posix.synchronize (rsync push from controller) — no delegate_to required.
# Source paths are absolute on the controller: oracle_software_src and oracle_patches_src
# must be mounted/accessible inside the EE container.
#
# Idempotency: rsync compares checksums/timestamps natively — only changed files transfer.

# ---------------------------------------------------------------------------
# 1. Oracle installer zip
# ---------------------------------------------------------------------------
- name: "TRANSFER | Sync Oracle installer zip"
  ansible.posix.synchronize:
    src: "{{ oracle_software_src }}/{{ oracle_installer_zip }}"
    dest: "{{ oracle_software_dst }}/{{ oracle_installer_zip }}"
    mode: push
    rsync_path: "sudo rsync"
  tags: oracle_transfer

- name: "TRANSFER | Fix installer zip ownership"
  ansible.builtin.file:
    path: "{{ oracle_software_dst }}/{{ oracle_installer_zip }}"
    owner: oracle
    group: oinstall
    mode: "0640"
  tags: oracle_transfer

# ---------------------------------------------------------------------------
# 2. OPatch replacement
# ---------------------------------------------------------------------------
- name: "TRANSFER | Sync OPatch replacement directory"
  ansible.posix.synchronize:
    src: "{{ oracle_patches_src }}/{{ oracle_opatch_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}/"
    mode: push
    rsync_path: "sudo rsync"
  tags: oracle_transfer

- name: "TRANSFER | Fix OPatch directory ownership"
  ansible.builtin.file:
    path: "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}"
    owner: oracle
    group: oinstall
    recurse: true
    state: directory
  tags: oracle_transfer

# ---------------------------------------------------------------------------
# 3. RU + one-off patch bundle
# ---------------------------------------------------------------------------
- name: "TRANSFER | Sync RU patch directory ({{ oracle_ru_patch_dir }})"
  ansible.posix.synchronize:
    src: "{{ oracle_patches_src }}/{{ oracle_ru_patch_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/"
    mode: push
    rsync_path: "sudo rsync"
  tags: oracle_transfer

- name: "TRANSFER | Fix RU patch directory ownership"
  ansible.builtin.file:
    path: "{{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}"
    owner: oracle
    group: oinstall
    recurse: true
    state: directory
  tags: oracle_transfer

# ---------------------------------------------------------------------------
# 4. Post-install patch 1 (survey-driven, optional)
# ---------------------------------------------------------------------------
- name: "TRANSFER | Check post_patch1 source on controller"
  ansible.builtin.stat:
    path: "{{ oracle_patches_src }}/{{ oracle_post_patch1_dir }}"
  delegate_to: localhost
  become: false
  register: _patch1_src
  when: oracle_post_patch1_enabled | bool
  tags: oracle_transfer

- name: "TRANSFER | Sync post_patch1 directory ({{ oracle_post_patch1_dir }})"
  ansible.posix.synchronize:
    src: "{{ oracle_patches_src }}/{{ oracle_post_patch1_dir }}/"
    dest: "{{ oracle_software_dst }}/{{ oracle_post_patch1_dir }}/"
    mode: push
    rsync_path: "sudo rsync"
  when:
    - oracle_post_patch1_enabled | bool
    - _patch1_src.stat.exists
  tags: oracle_transfer

- name: "TRANSFER | Fix post_patch1 directory ownership"
  ansible.builtin.file:
    path: "{{ oracle_software_dst }}/{{ oracle_post_patch1_dir }}"
    owner: oracle
    group: oinstall
    recurse: true
    state: directory
  when:
    - oracle_post_patch1_enabled | bool
    - _patch1_src.stat.exists
  tags: oracle_transfer

# ---------------------------------------------------------------------------
# 5. Post-install patches 2 + 3 (fixed patches)
# ---------------------------------------------------------------------------
- name: "TRANSFER | Check post-install patch sources on controller (patch2, patch3)"
  ansible.builtin.stat:
    path: "{{ oracle_patches_src }}/{{ item }}"
  delegate_to: localhost
  become: false
  register: _patch23_src
  loop:
    - "{{ oracle_post_patch2_dir }}"
    - "{{ oracle_post_patch3_dir }}"
  tags: oracle_transfer

- name: "TRANSFER | Sync post-install patch directories (patch2, patch3)"
  ansible.posix.synchronize:
    src: "{{ oracle_patches_src }}/{{ item.item }}/"
    dest: "{{ oracle_software_dst }}/{{ item.item }}/"
    mode: push
    rsync_path: "sudo rsync"
  loop: "{{ _patch23_src.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists
  tags: oracle_transfer

- name: "TRANSFER | Fix post-install patch directories ownership (patch2, patch3)"
  ansible.builtin.file:
    path: "{{ oracle_software_dst }}/{{ item.item }}"
    owner: oracle
    group: oinstall
    recurse: true
    state: directory
  loop: "{{ _patch23_src.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists
  tags: oracle_transfer

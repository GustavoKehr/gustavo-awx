---
# Format and mount Oracle LVs.
# fstab entries are assumed to already exist (pre-configured by the provisioning workflow).
# Mount order matters: lv_awor (/oracle/AWOR) must be mounted first before subdirectory mounts.

- name: "STORAGE | Define LV mount map"
  ansible.builtin.set_fact:
    _oracle_lv_mounts:
      - lv: /dev/mapper/vg_data-lv_awor
        mp: "/oracle/{{ oracle_sid }}"
        order: 0
      - lv: /dev/mapper/vg_data-lv_oradata
        mp: "/oracle/{{ oracle_sid }}/oradata1"
        order: 1
      - lv: /dev/mapper/vg_data-lv_mirrlogA
        mp: "/oracle/{{ oracle_sid }}/mirrlogA"
        order: 1
      - lv: /dev/mapper/vg_data-lv_mirrlogB
        mp: "/oracle/{{ oracle_sid }}/mirrlogB"
        order: 1
      - lv: /dev/mapper/vg_data-lv_origlogA
        mp: "/oracle/{{ oracle_sid }}/origlogA"
        order: 1
      - lv: /dev/mapper/vg_data-lv_origlogB
        mp: "/oracle/{{ oracle_sid }}/origlogB"
        order: 1
      - lv: /dev/mapper/vg_data-lv_oraarch
        mp: "/oracle/{{ oracle_sid }}/oraarch"
        order: 1
      - lv: /dev/mapper/vg_data-lv_undofile
        mp: "/oracle/{{ oracle_sid }}/undofile"
        order: 1
      - lv: /dev/mapper/vg_data-lv_tempfile
        mp: "/oracle/{{ oracle_sid }}/tempfile"
        order: 1
  tags: oracle_storage

- name: "STORAGE | Format LVs as XFS (skip if filesystem already present)"
  ansible.builtin.shell: |
    blkid -o value -s TYPE {{ item.lv }} | grep -q xfs && exit 0
    mkfs.xfs {{ item.lv }}
  loop: "{{ _oracle_lv_mounts }}"
  loop_control:
    label: "{{ item.lv }}"
  changed_when: true
  tags: oracle_storage

- name: "STORAGE | Create /oracle root mount point"
  ansible.builtin.file:
    path: /oracle
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: oracle_storage

- name: "STORAGE | Mount lv_awor to /oracle/{{ oracle_sid }}"
  ansible.builtin.shell: |
    mountpoint -q "/oracle/{{ oracle_sid }}" && exit 0
    mkdir -p "/oracle/{{ oracle_sid }}"
    mount "/oracle/{{ oracle_sid }}"
  changed_when: true
  tags: oracle_storage

- name: "STORAGE | Create subdirectory mount points under /oracle/{{ oracle_sid }}"
  ansible.builtin.file:
    path: "{{ item.mp }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ _oracle_lv_mounts | selectattr('order', 'eq', 1) | list }}"
  loop_control:
    label: "{{ item.mp }}"
  tags: oracle_storage

- name: "STORAGE | Mount all oracle subdirectory LVs"
  ansible.builtin.shell: |
    mountpoint -q "{{ item.mp }}" && exit 0
    mount "{{ item.mp }}"
  loop: "{{ _oracle_lv_mounts | selectattr('order', 'eq', 1) | list }}"
  loop_control:
    label: "{{ item.mp }}"
  changed_when: true
  tags: oracle_storage

- name: "STORAGE | Verify all oracle mounts are active"
  ansible.builtin.shell: |
    mountpoint -q "{{ item.mp }}" || (echo "FAIL: {{ item.mp }} not mounted" && exit 1)
  loop: "{{ _oracle_lv_mounts }}"
  loop_control:
    label: "{{ item.mp }}"
  changed_when: false
  tags: oracle_storage

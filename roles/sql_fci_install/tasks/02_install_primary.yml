---
# Install SQL Server as Failover Cluster Instance on primary node.
# The cluster resource "Cluster Disk 1" must exist before running this.
# After install, SQL Server resource group is created in the cluster.

- name: "Disable Windows Firewall (FCI install requirement)"
  ansible.windows.win_firewall:
    state: disabled
    profiles:
      - Domain
      - Private
      - Public

- name: "Run SQL Server FCI installation on primary"
  ansible.windows.win_package:
    path: "{{ _iso_drive }}setup.exe"
    product_id: ""
    arguments: >-
      /ConfigurationFile={{ fci_temp_dir }}\FciConfigurationFile.ini
      /SAPWD="{{ sql_sa_password }}"
      /IAcceptSQLServerLicenseTerms
    state: present
    expected_return_code: [0, 3010]
  register: _fci_install
  no_log: true

- name: "Reboot if installer returned 3010 (reboot required)"
  ansible.windows.win_reboot:
    reboot_timeout: 600
    post_reboot_delay: 30
  when: _fci_install.rc == 3010

- name: "Wait for WinRM after reboot"
  ansible.builtin.wait_for_connection:
    delay: 15
    timeout: 300
  when: _fci_install.rc == 3010

- name: "Verify SQL Server service is online in cluster"
  ansible.windows.win_shell: |
    $resource = Get-ClusterResource | Where-Object { $_.ResourceType -eq "SQL Server" }
    if ($resource -and $resource.State -eq "Online") {
      Write-Output "ONLINE: $($resource.Name)"
    } else {
      Write-Output "NOT_ONLINE: $($resource | Select-Object Name,State | Out-String)"
    }
  register: _sql_resource
  changed_when: false
  retries: 6
  delay: 15
  until: "'ONLINE' in _sql_resource.stdout"
  failed_when: "'NOT_ONLINE' in _sql_resource.stdout and (_sql_resource.attempts | default(1)) >= 6"

- name: "Install SSMS silently"
  ansible.windows.win_package:
    path: "{{ fci_temp_dir }}\\SSMS-Setup-ENU.exe"
    product_id: ""
    arguments: "/Quiet /NoRestart"
    state: present
    expected_return_code: [0, 3010]

- name: "Unmount ISO"
  community.windows.win_disk_image:
    image_path: "{{ fci_temp_dir }}\\SQLServer.iso"
    state: absent

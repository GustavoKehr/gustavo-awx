---
- name: "garantir E: montado antes do pre-reqs"
  ansible.windows.win_shell: |
    $diskNum = {{ win_disk_number | int }}
    $eRoot = "E:" + [string][char]92
    $cdromVols = Get-WmiObject Win32_Volume | Where-Object { $_.DriveType -in @(5,2) -and $_.DriveLetter }
    foreach ($vol in $cdromVols) {
        $null = & mountvol $vol.DriveLetter /D 2>&1
    }
    $cdromDevs = Get-PnpDevice -Class CDROM -Status OK -ErrorAction SilentlyContinue
    foreach ($dev in $cdromDevs) {
        Disable-PnpDevice -InstanceId $dev.InstanceId -Confirm:$false -ErrorAction SilentlyContinue | Out-Null
    }
    $eVol = Get-Volume -DriveLetter E -ErrorAction SilentlyContinue
    if ($eVol -and $eVol.FileSystemLabel -eq "SQL_DATA") {
        Write-Output "E is ready SQL_DATA"
        exit 0
    }
    $allParts = Get-Partition -DiskNumber $diskNum -ErrorAction SilentlyContinue
    $dataPart = $allParts | Where-Object {$_.Type -eq "Basic"} | Select-Object -First 1
    if ($dataPart) {
        $dataPart | Remove-PartitionAccessPath -AccessPath $eRoot -ErrorAction SilentlyContinue
        $dataPart | Add-PartitionAccessPath -AccessPath $eRoot
        Write-Output "Remounted E on disk $diskNum for pre-reqs"
    } else {
        Write-Error "Cannot find data partition on disk $diskNum"
        exit 1
    }
  changed_when: false
  tags: [sql_pre, storage_guard]

- name: "desativar FW do windows"
  community.windows.win_firewall:
    state: disabled
    profiles: [Domain, Private, Public]
  tags: [sql_pre, firewall_disable]

- name: "cria pasta temporaria"
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - 'C:\ansible_temp'
    - 'E:\temp_install'
  tags: [sql_pre, folders]

- name: "gerar ConfigurationFile.ini a partir do template"
  ansible.windows.win_template:
    src: ConfigurationFile.ini.j2
    dest: 'C:\ansible_temp\ConfigurationFile.ini'
  tags: [sql_pre, sql_config]

- name: "baixa ISO do SQL Server 2025"
  ansible.windows.win_get_url:
    url: "{{ sql_repo_base_url }}/sqlserver/SQLServer2025-x64-ENU.iso"
    dest: 'E:\temp_install\SQLServer2025-x64-ENU.iso'
    timeout: 1200
  tags: [sql_pre, sql_download]

- name: "baixa o SSMS"
  ansible.windows.win_get_url:
    url: "{{ sql_repo_base_url }}/sqlserver/SSMS-Setup-ENU.exe"
    dest: 'E:\temp_install\SSMS-Setup-ENU.exe'
    timeout: 600
  tags: [sql_pre, ssms_download]

- name: "monta imagem"
  community.windows.win_disk_image:
    image_path: 'E:\temp_install\SQLServer2025-x64-ENU.iso'
    state: present
  register: disk_iso_mount
  tags: [sql_pre, sql_mount]

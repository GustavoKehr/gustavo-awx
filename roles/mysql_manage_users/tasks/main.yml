---
- name: "Build db_users from flat survey vars when list not provided"
  ansible.builtin.set_fact:
    db_users:
      - username: "{{ db_username }}"
        password: "{{ db_password | default('') }}"
        state: "{{ db_user_state | default('present') }}"
        host: "{{ db_user_host | default('%') }}"
        databases: "{{ db_target_databases | default('appdb') }}"
        privileges: "{{ db_privileges | default('SELECT') }}"
        append_privileges: "{{ db_append_privileges | default(true) | bool }}"
        revoke: "{{ db_revoke_access | default(false) | bool }}"
        manage_databases: "{{ db_manage_databases | default(false) | bool }}"
        allowed_ips: >-
          {{
            (db_allowed_ips | default(''))
            | string | split(',')
            | map('trim') | reject('equalto', '') | list
          }}
  when:
    - db_users | default([]) | length == 0
    - db_username | default('') | length > 0
  tags: [mysql, mysql_users]

- name: "Validate db_users list is not empty"
  ansible.builtin.assert:
    that:
      - db_users | length > 0
    fail_msg: "db_users list is empty. Provide at least one user entry."
  tags: [mysql, mysql_users, mysql_users_validate]

- name: "Manage each MySQL user"
  ansible.builtin.include_tasks: manage_user.yml
  loop: "{{ db_users }}"
  loop_control:
    loop_var: db_user
    label: "{{ db_user.username }}"
  tags: [mysql, mysql_users]

---
- name: "Normalize target database list"
  ansible.builtin.set_fact:
    mysql_target_databases: >-
      {{
        db_target_databases
        if (db_target_databases is sequence and db_target_databases is not string)
        else (db_target_databases | string).split(',')
      }}
  tags: [mysql, mysql_users, mysql_users_validate]

- name: "Trim normalized target database list"
  ansible.builtin.set_fact:
    mysql_target_databases: "{{ mysql_target_databases | map('trim') | reject('equalto', '') | list }}"
  tags: [mysql, mysql_users, mysql_users_validate]

- name: "Validate survey variables and operation mode"
  ansible.builtin.assert:
    that:
      - db_username | length > 0
      - db_user_host | length > 0
      - db_user_state in ['present', 'absent']
      - mysql_target_databases | length > 0
      - db_privileges | length > 0
      - db_user_host == '%' or (db_user_host is match('^(([0-9]{1,3}\\.){3}[0-9]{1,3})(/[0-9]{1,2})?$'))
      - not (db_user_state == 'absent' and db_revoke_access | bool)
    fail_msg: >-
      Invalid input for mysql_manage_users. Ensure db_username, db_user_host (IPv4/CIDR or %),
      db_privileges and db_target_databases are set, and operation mode is consistent.
  tags: [mysql, mysql_users, mysql_users_validate]

- name: "Build MySQL privilege scope string"
  ansible.builtin.set_fact:
    mysql_priv_scope: "{{ mysql_target_databases | map('regex_replace', '^(.*)$', '\\1.*:' ~ db_privileges) | join('/') }}"
  tags: [mysql, mysql_users, mysql_users_validate]

- name: "Optionally create target databases"
  community.mysql.mysql_db:
    name: "{{ item }}"
    state: present
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] | default('/var/run/mysqld/mysqld.sock') }}"
    check_implicit_admin: true
  loop: "{{ mysql_target_databases }}"
  when:
    - db_manage_databases | bool
    - db_user_state == 'present'
  tags: [mysql, mysql_users, mysql_db]

- name: "Create or update MySQL user grants"
  community.mysql.mysql_user:
    name: "{{ db_username }}"
    host: "{{ db_user_host }}"
    password: "{{ db_password if db_password | length > 0 else omit }}"
    priv: "{{ mysql_priv_scope }}"
    append_privs: "{{ db_append_privileges | bool }}"
    state: present
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] | default('/var/run/mysqld/mysqld.sock') }}"
    check_implicit_admin: true
  when:
    - db_user_state == 'present'
    - not db_revoke_access | bool
  no_log: true
  tags: [mysql, mysql_users, mysql_grants]

- name: "Revoke selected grants from MySQL user"
  community.mysql.mysql_user:
    name: "{{ db_username }}"
    host: "{{ db_user_host }}"
    priv: "{{ mysql_priv_scope }}"
    subtract_privs: true
    state: present
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] | default('/var/run/mysqld/mysqld.sock') }}"
    check_implicit_admin: true
  when:
    - db_user_state == 'present'
    - db_revoke_access | bool
  tags: [mysql, mysql_users, mysql_revoke]

- name: "Drop MySQL user when requested"
  community.mysql.mysql_user:
    name: "{{ db_username }}"
    host: "{{ db_user_host }}"
    state: absent
    login_unix_socket: "{{ mysql_login_unix_socket[ansible_os_family] | default('/var/run/mysqld/mysqld.sock') }}"
    check_implicit_admin: true
  when: db_user_state == 'absent'
  tags: [mysql, mysql_users, mysql_remove_user]

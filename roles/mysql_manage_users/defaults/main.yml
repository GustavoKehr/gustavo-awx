---
# List of users to manage. Each item uses the schema below.
# db_users:
#   - username: appuser
#     password: "Secure#123"       # omit to skip password update
#     state: present               # present | absent
#     host: "%"                    # user@host (% = any host; or specific IP/CIDR)
#     databases: ["appdb"]         # target databases (list or comma-separated string)
#     privileges: "SELECT,INSERT"  # MySQL privilege string
#     append_privileges: true      # true = append; false = replace existing grants
#     revoke: false                # true = revoke privileges (state must be present)
#     manage_databases: false      # true = create databases when state=present
db_users: []

# Connection for community.mysql modules.
mysql_login_unix_socket:
  RedHat: /var/lib/mysql/mysql.sock
  Debian: /var/run/mysqld/mysqld.sock

---
##############################################################
# Oracle Security Hardening
# Items 1.1 – 6.1.2 + final summary report
#
# Tag scheme:
#   Role-level : [oracle_security]
#   Per-group  : [oracle_account | oracle_password | oracle_access |
#                 oracle_service | oracle_audit | oracle_patches]
#   Per-item   : [item_1_1] … [item_6_1_2]
#
# Run single item:   --tags item_3_1
# Run group:         --tags oracle_password
# Check-only:        -e oracle_security_check_only=true
##############################################################

# ─── Group 1: Account Management ─────────────────────────────────────────────

- name: "1.1 - List all Oracle users (account_status)"
  ansible.builtin.include_tasks: 01_1_user_status.yml
  tags: [oracle_security, oracle_account, item_1_1]

- name: "1.2 - Enforce FAILED_LOGIN_ATTEMPTS <= {{ oracle_security_failed_login_attempts }}"
  ansible.builtin.include_tasks: 01_2_brute_force.yml
  tags: [oracle_security, oracle_account, item_1_2]

- name: "1.3 - Detect sample/default Oracle accounts"
  ansible.builtin.include_tasks: 01_3_sample_accounts.yml
  tags: [oracle_security, oracle_account, item_1_3]

# ─── Group 2: Password Policy ─────────────────────────────────────────────────

- name: "2.1 - Deploy and enforce PASSWORD_VERIFY_FUNCTION"
  ansible.builtin.include_tasks: 02_1_password_complexity.yml
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.2 - Check for default/known passwords"
  ansible.builtin.include_tasks: 02_2_default_passwords.yml
  tags: [oracle_security, oracle_password, item_2_2]

- name: "2.3 - Enforce PASSWORD_LIFE_TIME <= {{ oracle_security_password_life_time }}"
  ansible.builtin.include_tasks: 02_3_password_lifetime.yml
  tags: [oracle_security, oracle_password, item_2_3]

- name: "2.4A - Enforce PASSWORD_REUSE_MAX <= {{ oracle_security_password_reuse_max }}"
  ansible.builtin.include_tasks: 02_4a_password_reuse_max.yml
  tags: [oracle_security, oracle_password, item_2_4a]

- name: "2.4B - Enforce PASSWORD_REUSE_TIME >= {{ oracle_security_password_reuse_time }}"
  ansible.builtin.include_tasks: 02_4b_password_reuse_time.yml
  tags: [oracle_security, oracle_password, item_2_4b]

# ─── Group 3: Access Control ──────────────────────────────────────────────────

- name: "3.1 - Check sqlnet.ora TCP.INVITED_NODES (IP access control)"
  ansible.builtin.include_tasks: 03_1_sqlnet_access.yml
  tags: [oracle_security, oracle_access, item_3_1]

- name: "3.2A - List DBA role grantees"
  ansible.builtin.include_tasks: 03_2a_dba_grantees.yml
  tags: [oracle_security, oracle_access, item_3_2a]

- name: "3.2B - List dangerous system privilege grantees"
  ansible.builtin.include_tasks: 03_2b_dangerous_privs.yml
  tags: [oracle_security, oracle_access, item_3_2b]

- name: "3.3 - Check and fix Oracle system file permissions"
  ansible.builtin.include_tasks: 03_3_file_permissions.yml
  tags: [oracle_security, oracle_access, item_3_3]

# ─── Group 4: Service Management ─────────────────────────────────────────────

- name: "4.1 - Check UTL_* grants to PUBLIC"
  ansible.builtin.include_tasks: 04_1_utl_grants.yml
  tags: [oracle_security, oracle_service, item_4_1]

- name: "4.2 - List database links"
  ansible.builtin.include_tasks: 04_2_db_links.yml
  tags: [oracle_security, oracle_service, item_4_2]

- name: "4.3 - Check listener port (flag if default 1521)"
  ansible.builtin.include_tasks: 04_3_listener_port.yml
  tags: [oracle_security, oracle_service, item_4_3]

- name: "4.4 - List backup/temp tables"
  ansible.builtin.include_tasks: 04_4_backup_tables.yml
  tags: [oracle_security, oracle_service, item_4_4]

# ─── Group 5: Audit ───────────────────────────────────────────────────────────

- name: "5.1 - Check listener log status"
  ansible.builtin.include_tasks: 05_1_listener_log.yml
  tags: [oracle_security, oracle_audit, item_5_1]

# ─── Group 6: Patches ─────────────────────────────────────────────────────────

- name: "6.1.1 - Run opatch lsinventory"
  ansible.builtin.include_tasks: 06_1_1_opatch_inventory.yml
  tags: [oracle_security, oracle_patches, item_6_1_1]

- name: "6.1.2 - Check Oracle version / EOS flag"
  ansible.builtin.include_tasks: 06_1_2_eos_check.yml
  tags: [oracle_security, oracle_patches, item_6_1_2]

# ─── Summary Report ───────────────────────────────────────────────────────────

- name: "Security Report Summary"
  ansible.builtin.include_tasks: 99_report_summary.yml
  tags: [oracle_security, oracle_report]

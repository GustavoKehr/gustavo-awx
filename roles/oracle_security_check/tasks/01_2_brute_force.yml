---
# Item 1.2 — Brute force protection
# FIX: set FAILED_LOGIN_ATTEMPTS <= oracle_security_failed_login_attempts on all profiles
# Tags: [oracle_security, oracle_account, item_1_2]

- name: "1.2 - Query profiles with FAILED_LOGIN_ATTEMPTS above threshold"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 0 FEEDBACK OFF HEADING OFF TRIMSPOOL ON
    SELECT profile
    FROM   dba_profiles
    WHERE  resource_name = 'FAILED_LOGIN_ATTEMPTS'
    AND    resource_type = 'PASSWORD'
    AND    CASE
             WHEN UPPER(limit) = 'UNLIMITED' THEN 99999
             WHEN UPPER(limit) = 'DEFAULT'   THEN 10
             ELSE TO_NUMBER(limit)
           END > {{ oracle_security_failed_login_attempts }};
    EXIT;
    EOF
  register: _item_1_2_profiles_to_fix
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_account, item_1_2]

- name: "1.2 - Display profiles that need FAILED_LOGIN_ATTEMPTS fix"
  ansible.builtin.debug:
    msg: >-
      Profiles with FAILED_LOGIN_ATTEMPTS > {{ oracle_security_failed_login_attempts }}:
      {{ _item_1_2_profiles_to_fix.stdout_lines | select | list | default(['none'], true) }}
  tags: [oracle_security, oracle_account, item_1_2]

- name: "1.2 - ALTER PROFILE — set FAILED_LOGIN_ATTEMPTS"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    ALTER PROFILE "{{ item }}" LIMIT FAILED_LOGIN_ATTEMPTS {{ oracle_security_failed_login_attempts }};
    EXIT;
    EOF
  loop: "{{ _item_1_2_profiles_to_fix.stdout_lines | select | list }}"
  register: _item_1_2_alter_result
  changed_when: _item_1_2_alter_result.rc == 0
  become: true
  become_user: oracle
  when:
    - not oracle_security_check_only | bool
    - _item_1_2_profiles_to_fix.stdout_lines | select | list | length > 0
  tags: [oracle_security, oracle_account, item_1_2]

- name: "1.2 - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_1_2:
      item: "1.2"
      title: "FAILED_LOGIN_ATTEMPTS policy"
      threshold: "{{ oracle_security_failed_login_attempts }}"
      profiles_fixed: "{{ _item_1_2_profiles_to_fix.stdout_lines | select | list }}"
      check_only: "{{ oracle_security_check_only | bool }}"
  tags: [oracle_security, oracle_account, item_1_2]

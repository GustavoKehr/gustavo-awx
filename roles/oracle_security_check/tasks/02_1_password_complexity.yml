---
# Item 2.1 — Password complexity verification function
# FIX: deploy complexity_check + string_distance + verify_function_12C, apply to all profiles
# Tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Query profiles missing PASSWORD_VERIFY_FUNCTION"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 0 FEEDBACK OFF HEADING OFF TRIMSPOOL ON
    SELECT profile
    FROM   dba_profiles
    WHERE  resource_name = 'PASSWORD_VERIFY_FUNCTION'
    AND    resource_type = 'PASSWORD'
    AND    (UPPER(limit) = 'NULL' OR limit IS NULL OR UPPER(limit) = 'DEFAULT')
    ORDER  BY profile;
    EXIT;
    EOF
  register: _item_2_1_profiles_missing
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Display profiles missing PASSWORD_VERIFY_FUNCTION"
  ansible.builtin.debug:
    msg: >-
      Profiles without PASSWORD_VERIFY_FUNCTION:
      {{ _item_2_1_profiles_missing.stdout_lines | select | list | default(['none — all profiles already configured'], true) }}
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Deploy verify_function_12C SQL script to target"
  ansible.builtin.template:
    src: verify_function_12c.sql.j2
    dest: /tmp/oracle_sec_verify_function.sql
    owner: oracle
    group: oinstall
    mode: "0600"
  become: true
  when: not oracle_security_check_only | bool
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Create complexity_check, string_distance, verify_function_12C in DB"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba @/tmp/oracle_sec_verify_function.sql
  register: _item_2_1_create_result
  changed_when: "'Function created' in (_item_2_1_create_result.stdout | default(''))"
  become: true
  become_user: oracle
  when: not oracle_security_check_only | bool
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Apply PASSWORD_VERIFY_FUNCTION to profiles missing it"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    ALTER PROFILE "{{ item }}" LIMIT PASSWORD_VERIFY_FUNCTION verify_function_12C;
    EXIT;
    EOF
  loop: "{{ _item_2_1_profiles_missing.stdout_lines | select | list }}"
  register: _item_2_1_alter_result
  changed_when: _item_2_1_alter_result.rc == 0
  become: true
  become_user: oracle
  when:
    - not oracle_security_check_only | bool
    - _item_2_1_profiles_missing.stdout_lines | select | list | length > 0
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Remove SQL script from target"
  ansible.builtin.file:
    path: /tmp/oracle_sec_verify_function.sql
    state: absent
  become: true
  when: not oracle_security_check_only | bool
  tags: [oracle_security, oracle_password, item_2_1]

- name: "2.1 - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_2_1:
      item: "2.1"
      title: "PASSWORD_VERIFY_FUNCTION enforcement"
      profiles_fixed: "{{ _item_2_1_profiles_missing.stdout_lines | select | list }}"
      check_only: "{{ oracle_security_check_only | bool }}"
  tags: [oracle_security, oracle_password, item_2_1]

---
# Item 2.3 — Password expiration period
# FIX: set PASSWORD_LIFE_TIME <= oracle_security_password_life_time on all profiles
#      (excludes profiles in oracle_security_password_life_time_exclude_profiles)
# Tags: [oracle_security, oracle_password, item_2_3]

- name: "2.3 - Query profiles with PASSWORD_LIFE_TIME above threshold"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 0 FEEDBACK OFF HEADING OFF TRIMSPOOL ON
    SELECT profile
    FROM   dba_profiles
    WHERE  resource_name = 'PASSWORD_LIFE_TIME'
    AND    resource_type = 'PASSWORD'
    AND    profile NOT IN ({{ oracle_security_password_life_time_exclude_profiles | map('upper') | map('regex_replace', '^(.*)$', "'\g<1>'") | join(',') }})
    AND    CASE
             WHEN UPPER(limit) = 'UNLIMITED' THEN 99999
             WHEN UPPER(limit) = 'DEFAULT'   THEN 180
             ELSE TO_NUMBER(limit)
           END > {{ oracle_security_password_life_time }};
    EXIT;
    EOF
  register: _item_2_3_profiles_to_fix
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_password, item_2_3]

- name: "2.3 - Display profiles that need PASSWORD_LIFE_TIME fix"
  ansible.builtin.debug:
    msg: >-
      Profiles with PASSWORD_LIFE_TIME > {{ oracle_security_password_life_time }}:
      {{ _item_2_3_profiles_to_fix.stdout_lines | select | list | default(['none'], true) }}
  tags: [oracle_security, oracle_password, item_2_3]

- name: "2.3 - ALTER PROFILE — set PASSWORD_LIFE_TIME"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    ALTER PROFILE "{{ item }}" LIMIT PASSWORD_LIFE_TIME {{ oracle_security_password_life_time }};
    EXIT;
    EOF
  loop: "{{ _item_2_3_profiles_to_fix.stdout_lines | select | list }}"
  register: _item_2_3_alter_result
  changed_when: _item_2_3_alter_result.rc == 0
  become: true
  become_user: oracle
  when:
    - not oracle_security_check_only | bool
    - _item_2_3_profiles_to_fix.stdout_lines | select | list | length > 0
  tags: [oracle_security, oracle_password, item_2_3]

- name: "2.3 - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_2_3:
      item: "2.3"
      title: "PASSWORD_LIFE_TIME enforcement"
      threshold: "{{ oracle_security_password_life_time }}"
      profiles_fixed: "{{ _item_2_3_profiles_to_fix.stdout_lines | select | list }}"
      excluded: "{{ oracle_security_password_life_time_exclude_profiles }}"
      check_only: "{{ oracle_security_check_only | bool }}"
  tags: [oracle_security, oracle_password, item_2_3]

---
# Item 1.3 — Unnecessary/sample account detection
# REPORT ONLY: detect default Oracle installation accounts still present
# Tags: [oracle_security, oracle_account, item_1_3]

- name: "1.3 - Query for sample/default installation accounts"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 9999 LINESIZE 100 FEEDBACK OFF HEADING ON TRIMSPOOL ON
    COL USERNAME FORMAT A30
    COL ACCOUNT_STATUS FORMAT A20
    SELECT username, account_status
    FROM   dba_users
    WHERE  username IN ({{ oracle_security_sample_accounts | map('upper') | map('regex_replace', '^(.*)$', "'\g<1>'") | join(',') }})
    ORDER  BY username;
    EXIT;
    EOF
  register: _item_1_3_sample_found
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_account, item_1_3]

- name: "1.3 - Display sample accounts found"
  ansible.builtin.debug:
    msg: >-
      Sample/default accounts detected (manual removal required):
      {{ _item_1_3_sample_found.stdout_lines | select | list | default(['none found'], true) }}
  tags: [oracle_security, oracle_account, item_1_3]

- name: "1.3 - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_1_3:
      item: "1.3"
      title: "Sample/default installation accounts"
      data: "{{ _item_1_3_sample_found.stdout_lines | select | list }}"
      note: "Manual action required — delete unnecessary accounts"
  tags: [oracle_security, oracle_account, item_1_3]

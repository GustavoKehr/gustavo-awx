---
# Item 2.2 — Default/vulnerable password detection
# REPORT ONLY: attempt login with known default credentials, report successes
# Tags: [oracle_security, oracle_password, item_2_2]

- name: "2.2 - Probe account with default credentials"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s "{{ item.username }}/{{ item.password }}@localhost/{{ oracle_sid }}" <<'EOF'
    SELECT 'LOGIN_SUCCESS' FROM DUAL;
    EXIT;
    EOF
  loop: "{{ oracle_security_default_credentials }}"
  loop_control:
    label: "{{ item.username }}"
  register: _item_2_2_probe_results
  changed_when: false
  failed_when: false
  no_log: true
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_password, item_2_2]

- name: "2.2 - Build list of accounts with successful default-password login"
  ansible.builtin.set_fact:
    _item_2_2_vulnerable: >-
      {{
        _item_2_2_probe_results.results
        | selectattr('stdout', 'search', 'LOGIN_SUCCESS')
        | map(attribute='item')
        | map(attribute='username')
        | list
      }}
  tags: [oracle_security, oracle_password, item_2_2]

- name: "2.2 - Display accounts with default passwords (SECURITY RISK)"
  ansible.builtin.debug:
    msg: >-
      [2.2] Accounts using default passwords (CHANGE IMMEDIATELY):
      {{ _item_2_2_vulnerable | default(['none detected'], true) }}
  tags: [oracle_security, oracle_password, item_2_2]

- name: "2.2 - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_2_2:
      item: "2.2"
      title: "Default password usage"
      vulnerable_accounts: "{{ _item_2_2_vulnerable | default([]) }}"
      note: "Manual action required — change passwords immediately"
  tags: [oracle_security, oracle_password, item_2_2]

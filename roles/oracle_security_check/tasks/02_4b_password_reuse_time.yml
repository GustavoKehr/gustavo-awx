---
# Item 2.4B — Password reuse (time-based)
# FIX: set PASSWORD_REUSE_TIME >= oracle_security_password_reuse_time on all profiles
# Tags: [oracle_security, oracle_password, item_2_4b]

- name: "2.4B - Query profiles with PASSWORD_REUSE_TIME below threshold"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 0 FEEDBACK OFF HEADING OFF TRIMSPOOL ON
    SELECT profile
    FROM   dba_profiles
    WHERE  resource_name = 'PASSWORD_REUSE_TIME'
    AND    resource_type = 'PASSWORD'
    AND    CASE
             WHEN UPPER(limit) = 'UNLIMITED' THEN 99999
             WHEN UPPER(limit) = 'DEFAULT'   THEN 0
             ELSE TO_NUMBER(limit)
           END < {{ oracle_security_password_reuse_time }};
    EXIT;
    EOF
  register: _item_2_4b_profiles_to_fix
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_password, item_2_4b]

- name: "2.4B - Display profiles that need PASSWORD_REUSE_TIME fix"
  ansible.builtin.debug:
    msg: >-
      Profiles with PASSWORD_REUSE_TIME < {{ oracle_security_password_reuse_time }}:
      {{ _item_2_4b_profiles_to_fix.stdout_lines | select | list | default(['none'], true) }}
  tags: [oracle_security, oracle_password, item_2_4b]

- name: "2.4B - ALTER PROFILE — set PASSWORD_REUSE_TIME"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    ALTER PROFILE "{{ item }}" LIMIT PASSWORD_REUSE_TIME {{ oracle_security_password_reuse_time }};
    EXIT;
    EOF
  loop: "{{ _item_2_4b_profiles_to_fix.stdout_lines | select | list }}"
  register: _item_2_4b_alter_result
  changed_when: _item_2_4b_alter_result.rc == 0
  become: true
  become_user: oracle
  when:
    - not oracle_security_check_only | bool
    - _item_2_4b_profiles_to_fix.stdout_lines | select | list | length > 0
  tags: [oracle_security, oracle_password, item_2_4b]

- name: "2.4B - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_2_4b:
      item: "2.4B"
      title: "PASSWORD_REUSE_TIME enforcement"
      threshold: "{{ oracle_security_password_reuse_time }}"
      profiles_fixed: "{{ _item_2_4b_profiles_to_fix.stdout_lines | select | list }}"
      check_only: "{{ oracle_security_check_only | bool }}"
  tags: [oracle_security, oracle_password, item_2_4b]

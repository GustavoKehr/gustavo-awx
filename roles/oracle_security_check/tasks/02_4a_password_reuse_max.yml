---
# Item 2.4A — Password reuse (count-based)
# FIX: set PASSWORD_REUSE_MAX <= oracle_security_password_reuse_max on all profiles
# Tags: [oracle_security, oracle_password, item_2_4a]

- name: "2.4A - Query profiles with PASSWORD_REUSE_MAX above threshold"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    SET PAGESIZE 0 FEEDBACK OFF HEADING OFF TRIMSPOOL ON
    SELECT profile
    FROM   dba_profiles
    WHERE  resource_name = 'PASSWORD_REUSE_MAX'
    AND    resource_type = 'PASSWORD'
    AND    CASE
             WHEN UPPER(limit) = 'UNLIMITED' THEN 99999
             WHEN UPPER(limit) = 'DEFAULT'   THEN 99999
             ELSE TO_NUMBER(limit)
           END > {{ oracle_security_password_reuse_max }};
    EXIT;
    EOF
  register: _item_2_4a_profiles_to_fix
  changed_when: false
  become: true
  become_user: oracle
  tags: [oracle_security, oracle_password, item_2_4a]

- name: "2.4A - Display profiles that need PASSWORD_REUSE_MAX fix"
  ansible.builtin.debug:
    msg: >-
      Profiles with PASSWORD_REUSE_MAX > {{ oracle_security_password_reuse_max }}:
      {{ _item_2_4a_profiles_to_fix.stdout_lines | select | list | default(['none'], true) }}
  tags: [oracle_security, oracle_password, item_2_4a]

- name: "2.4A - ALTER PROFILE — set PASSWORD_REUSE_MAX"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH=$ORACLE_HOME/bin:$PATH
    sqlplus -s / as sysdba <<'EOF'
    WHENEVER SQLERROR EXIT FAILURE;
    ALTER PROFILE "{{ item }}" LIMIT PASSWORD_REUSE_MAX {{ oracle_security_password_reuse_max }};
    EXIT;
    EOF
  loop: "{{ _item_2_4a_profiles_to_fix.stdout_lines | select | list }}"
  register: _item_2_4a_alter_result
  changed_when: _item_2_4a_alter_result.rc == 0
  become: true
  become_user: oracle
  when:
    - not oracle_security_check_only | bool
    - _item_2_4a_profiles_to_fix.stdout_lines | select | list | length > 0
  tags: [oracle_security, oracle_password, item_2_4a]

- name: "2.4A - Register finding for summary report"
  ansible.builtin.set_fact:
    _report_2_4a:
      item: "2.4A"
      title: "PASSWORD_REUSE_MAX enforcement"
      threshold: "{{ oracle_security_password_reuse_max }}"
      profiles_fixed: "{{ _item_2_4a_profiles_to_fix.stdout_lines | select | list }}"
      check_only: "{{ oracle_security_check_only | bool }}"
  tags: [oracle_security, oracle_password, item_2_4a]

---
# ─── Oracle identity ──────────────────────────────────────────────────────────
# Mirror oracle_install defaults — override via host_vars/group_vars
oracle_sid:  "TSTOR"
oracle_base: "/oracle/{{ oracle_sid }}"
oracle_home: "{{ oracle_base }}/19.0.0"
oracle_sqlnet_ora: "{{ oracle_home }}/network/admin/sqlnet.ora"

# ─── Item 1.2 — Brute force protection ───────────────────────────────────────
oracle_security_failed_login_attempts: 5

# ─── Item 2.3 — Password expiration ──────────────────────────────────────────
oracle_security_password_life_time: 90
# Profiles excluded from PASSWORD_LIFE_TIME enforcement (service accounts)
oracle_security_password_life_time_exclude_profiles:
  - APPLICATION

# ─── Items 2.4A / 2.4B — Password reuse ──────────────────────────────────────
oracle_security_password_reuse_max:  1
oracle_security_password_reuse_time: 180

# ─── Global mode ──────────────────────────────────────────────────────────────
# true = no ALTER/REVOKE executed; only report findings
oracle_security_check_only: false

# ─── Item 3.1 — IP access control ────────────────────────────────────────────
# IPs to enforce in TCP.INVITED_NODES (append-only, same strategy as manage_ip.yml)
# Applied only when oracle_security_check_only=false and list is non-empty
oracle_security_allowed_ips: []

# ─── Item 4.1 — UTL package grants ───────────────────────────────────────────
# Explicit opt-in to REVOKE EXECUTE ON UTL_* FROM PUBLIC
oracle_security_revoke_utl_public: false

# ─── Item 6.1.2 — EOS version check ──────────────────────────────────────────
# Version strings that are known EOS (e.g. "12.2.0.1.0", "11.2.0.4.0")
oracle_security_known_eos_versions: []

# ─── Item 1.3 — Sample/default account detection ─────────────────────────────
oracle_security_sample_accounts:
  - SCOTT
  - DEMO
  - ADAMS
  - BLAKE
  - JONES
  - CLARK

# ─── Item 2.2 — Default credential probes ────────────────────────────────────
oracle_security_default_credentials:
  - { username: "SCOTT",   password: "tiger"           }
  - { username: "SYSTEM",  password: "manager"         }
  - { username: "SYS",     password: "change_on_install" }
  - { username: "DBSNMP",  password: "dbsnmp"          }
  - { username: "TRACESVR",password: "trace"           }
  - { username: "OUTLN",   password: "outln"           }
  - { username: "MDSYS",   password: "mdsys"           }
  - { username: "CTXSYS",  password: "ctxsys"          }
  - { username: "ORDSYS",  password: "ordsys"          }
  - { username: "LBACSYS", password: "LBACSYS"         }
  - { username: "OLAPSYS", password: "manager"         }

# ─── Item 3.2B — Dangerous system privileges ─────────────────────────────────
oracle_security_dangerous_privs:
  - "GRANT ANY PRIVILEGE"
  - "GRANT ANY ROLE"
  - "CREATE ANY PROCEDURE"
  - "SELECT ANY TABLE"
  - "DELETE ANY TABLE"
  - "ALTER ANY VIEW"
  - "ALTER ANY TRIGGER"
  - "CREATE ANY DIRECTORY"
  - "ALTER SYSTEM"
  - "AUDIT ANY"
  - "ALTER DATABASE"
  - "DROP USER"
  - "EXPORT FULL DATABASE"
  - "SYSDBA"
  - "GRANT ANY OBJECT PRIVILEGE"
  - "EXECUTE ANY PROCEDURE"
  - "ALTER ANY PROCEDURE"
  - "UPDATE ANY TABLE"
  - "CREATE ANY VIEW"
  - "CREATE ANY TRIGGER"
  - "CREATE ANY SYNONYM"
  - "CREATE ANY JOB"
  - "AUDIT SYSTEM"
  - "ALTER USER"
  - "ALTER PROFILE"
  - "IMPORT FULL DATABASE"
  - "SYSOPER"

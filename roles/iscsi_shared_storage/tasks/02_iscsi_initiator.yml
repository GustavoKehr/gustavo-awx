---
# Connect Windows nodes as iSCSI initiators to the target on repositoryvm.
# Runs on both sqlvm01 and sqlvm02.

- name: "Enable and start MSiSCSI service"
  ansible.windows.win_service:
    name: MSiSCSI
    start_mode: auto
    state: started

- name: "Discover iSCSI target"
  ansible.windows.win_shell: |
    $existing = Get-IscsiTargetPortal -TargetPortalAddress "{{ iscsi_target_ip }}" `
      -ErrorAction SilentlyContinue
    if (-not $existing) {
      New-IscsiTargetPortal -TargetPortalAddress "{{ iscsi_target_ip }}" -TargetPortalPortNumber 3260
      Write-Output "CHANGED"
    } else {
      Write-Output "OK"
    }
  register: _portal_add
  changed_when: "'CHANGED' in _portal_add.stdout"

- name: "Connect to iSCSI target"
  ansible.windows.win_shell: |
    $target = Get-IscsiTarget | Where-Object { $_.NodeAddress -eq "{{ iscsi_iqn }}" }
    if (-not $target) {
      # Refresh discovery first
      Update-IscsiTarget
      $target = Get-IscsiTarget | Where-Object { $_.NodeAddress -eq "{{ iscsi_iqn }}" }
    }
    if (-not $target) {
      Write-Output "TARGET_NOT_FOUND"
      exit 1
    }
    $session = Get-IscsiSession | Where-Object { $_.TargetNodeAddress -eq "{{ iscsi_iqn }}" }
    if (-not $session) {
      Connect-IscsiTarget -NodeAddress "{{ iscsi_iqn }}" -IsPersistent $true
      Write-Output "CHANGED"
    } else {
      Write-Output "OK"
    }
  register: _iscsi_connect
  changed_when: "'CHANGED' in _iscsi_connect.stdout"
  failed_when: "'TARGET_NOT_FOUND' in _iscsi_connect.stdout"

- name: "Verify iSCSI disk is visible in Windows"
  ansible.windows.win_shell: |
    # Refresh disk list
    Update-HostStorageCache
    $disk = Get-Disk | Where-Object {
      $_.BusType -eq 'iSCSI' -or $_.FriendlyName -like '*LIO*' -or $_.FriendlyName -like '*TCMU*'
    }
    if ($disk) {
      Write-Output "FOUND: $($disk.Number) - $($disk.FriendlyName) - $($disk.Size/1GB)GB"
    } else {
      # List all disks for debugging
      Get-Disk | ForEach-Object { Write-Output "DISK: $($_.Number) - $($_.FriendlyName) - $($_.BusType)" }
      Write-Output "ISCSI_DISK_NOT_FOUND"
    }
  register: _disk_check
  changed_when: false
  failed_when: "'ISCSI_DISK_NOT_FOUND' in _disk_check.stdout"

- name: "Show iSCSI disk info"
  ansible.builtin.debug:
    msg: "{{ _disk_check.stdout_lines }}"

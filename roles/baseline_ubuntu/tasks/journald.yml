---
#####################################
# baseline_ubuntu — journald persistent logging
#####################################

- name: "journald — Ensure /etc/systemd/journald.conf.d exists"
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [baseline_ubuntu, journald]

- name: "journald — Configure persistent storage"
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/99-persistent.conf
    content: |
      [Journal]
      Storage={{ journald_storage }}
      Compress=yes
      SystemMaxUse=512M
      SystemKeepFree=256M
    owner: root
    group: root
    mode: "0644"
  register: journald_conf
  tags: [baseline_ubuntu, journald]

- name: "journald — Restart journald if changed"
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted
  when: journald_conf.changed
  tags: [baseline_ubuntu, journald]

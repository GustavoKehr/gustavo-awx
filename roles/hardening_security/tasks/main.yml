---
#####################################
# Hardening e Políticas de Segurança
# RHEL 7 / 8 / 9 / 10
# Idempotente + PROD-safe
#####################################

#####################################
# 4.0 - Backup date (necessário)
#####################################
- name: "4.0 - Define backup_date"
  ansible.builtin.set_fact:
    backup_date: "{{ ansible_date_time.date }}_{{ ansible_date_time.time | regex_replace(':', '') }}"
  tags: [hardening_security]

#####################################
# 4.1 Política de Senhas – /etc/login.defs
#####################################

- name: "4.1 - Stat /etc/login.defs"
  ansible.builtin.stat:
    path: /etc/login.defs
  register: login_defs_stat
  tags: [hardening_security, login_defs]

- name: "4.1 - Ensure PASS_MAX_DAYS 90"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^\s*PASS_MAX_DAYS\s+'
    line: 'PASS_MAX_DAYS   90'
    create: false
  register: ld_max
  when: login_defs_stat.stat.exists
  tags: [hardening_security, login_defs]

- name: "4.1 - Ensure PASS_MIN_DAYS 7"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^\s*PASS_MIN_DAYS\s+'
    line: 'PASS_MIN_DAYS   7'
    create: false
  register: ld_min
  when: login_defs_stat.stat.exists
  tags: [hardening_security, login_defs]

- name: "4.1 - Ensure PASS_WARN_AGE 7"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^\s*PASS_WARN_AGE\s+'
    line: 'PASS_WARN_AGE   7'
    create: false
  register: ld_warn
  when: login_defs_stat.stat.exists
  tags: [hardening_security, login_defs]

- name: "4.1 - Ensure PASS_MIN_LEN 8"
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: '^\s*PASS_MIN_LEN\s+'
    line: 'PASS_MIN_LEN    8'
    create: false
  register: ld_len
  when: login_defs_stat.stat.exists
  tags: [hardening_security, login_defs]

- name: "4.1 - Backup /etc/login.defs (only if changed)"
  ansible.builtin.copy:
    src: /etc/login.defs
    dest: "/etc/login.defs.{{ backup_date }}"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when:
    - login_defs_stat.stat.exists
    - ld_max.changed or ld_min.changed or ld_warn.changed or ld_len.changed
  tags: [hardening_security, login_defs]

#####################################
# 4.2 Configurações SSH
#####################################

- name: "4.2 - Stat /etc/ssh/sshd_config"
  ansible.builtin.stat:
    path: /etc/ssh/sshd_config
  register: sshd_conf_stat
  tags: [hardening_security, ssh]

- name: "4.2 - Configure SSH hardening options"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*#?\s*{{ item.key }}\b.*'
    line: "{{ item.key }} {{ item.value }}"
    create: false
  loop:
    - { key: "LoginGraceTime",      value: "0" }
    - { key: "ClientAliveInterval", value: "0" }
    - { key: "UseDNS",              value: "no" }
    - { key: "PermitRootLogin",     value: "no" }
  register: ssh_main
  when: sshd_conf_stat.stat.exists
  tags: [hardening_security, ssh]

- name: "4.2 - Ensure SSH Port 22"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Port\s+22\b'
    line: "Port 22"
    insertafter: EOF
    create: false
  register: ssh_port_22
  when: sshd_conf_stat.stat.exists
  tags: [hardening_security, ssh]

- name: "4.2 - Ensure SSH Port 20022"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*Port\s+20022\b'
    line: "Port 20022"
    insertafter: EOF
    create: false
  register: ssh_port_20022
  when: sshd_conf_stat.stat.exists
  tags: [hardening_security, ssh]

- name: "4.2 - Backup /etc/ssh/sshd_config (only if changed)"
  ansible.builtin.copy:
    src: /etc/ssh/sshd_config
    dest: "/etc/ssh/sshd_config.{{ backup_date }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  when:
    - sshd_conf_stat.stat.exists
    - ssh_main.changed or ssh_port_22.changed or ssh_port_20022.changed
  tags: [hardening_security, ssh]

- name: "4.2 - Validate sshd config (only if changed)"
  ansible.builtin.command: sshd -t
  changed_when: false
  when:
    - sshd_conf_stat.stat.exists
    - ssh_main.changed or ssh_port_22.changed or ssh_port_20022.changed
  tags: [hardening_security, ssh]

- name: "4.2 - Restart sshd (only if changed)"
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when:
    - sshd_conf_stat.stat.exists
    - ssh_main.changed or ssh_port_22.changed or ssh_port_20022.changed
  tags: [hardening_security, ssh]

#####################################
# 4.3 Sysstat – HISTORY=90
#####################################

- name: "4.3 - Check if /etc/sysconfig/sysstat exists"
  ansible.builtin.stat:
    path: /etc/sysconfig/sysstat
  register: sysstat_conf
  tags: [hardening_security, sysstat]

- name: "4.3 - Set sysstat HISTORY=90"
  ansible.builtin.lineinfile:
    path: /etc/sysconfig/sysstat
    regexp: '^\s*#?\s*HISTORY='
    line: 'HISTORY=90'
    create: false
  when: sysstat_conf.stat.exists
  tags: [hardening_security, sysstat]

#####################################
# 4.4 PAM
#####################################

# 4.4.1 faillock
- name: "4.4.1 - Check if /etc/security/faillock.conf exists"
  ansible.builtin.stat:
    path: /etc/security/faillock.conf
  register: faillock_conf
  tags: [hardening_security, pam, faillock]

- name: "4.4.1 - Configure faillock"
  ansible.builtin.lineinfile:
    path: /etc/security/faillock.conf
    regexp: '^\s*#?\s*{{ item.key }}\s*='
    line: "{{ item.key }} = {{ item.value }}"
    create: false
  loop:
    - { key: "deny",        value: "4" }
    - { key: "unlock_time", value: "1800" }
  when: faillock_conf.stat.exists
  tags: [hardening_security, pam, faillock]

# 4.4.2 pwhistory
- name: "4.4.2 - Check if /etc/security/pwhistory.conf exists"
  ansible.builtin.stat:
    path: /etc/security/pwhistory.conf
  register: pwhistory_conf
  tags: [hardening_security, pam, pwhistory]

- name: "4.4.2 - Configure pwhistory"
  ansible.builtin.lineinfile:
    path: /etc/security/pwhistory.conf
    regexp: '^\s*#?\s*remember\s*='
    line: "remember = 2"
    create: false
  when: pwhistory_conf.stat.exists
  tags: [hardening_security, pam, pwhistory]

# 4.4.3 pwquality
- name: "4.4.3 - Check if /etc/security/pwquality.conf exists"
  ansible.builtin.stat:
    path: /etc/security/pwquality.conf
  register: pwquality_conf
  tags: [hardening_security, pam, pwquality]

- name: "4.4.3 - Configure pwquality"
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: '^\s*#?\s*{{ item.key }}\s*='
    line: "{{ item.key }} = {{ item.value }}"
    create: false
  loop:
    - { key: "minlen",           value: "8" }
    - { key: "dcredit",          value: "-1" }
    - { key: "ucredit",          value: "-1" }
    - { key: "lcredit",          value: "-1" }
    - { key: "ocredit",          value: "-1" }
    - { key: "minclass",         value: "1" }
    - { key: "maxrepeat",        value: "2" }
    - { key: "maxclassrepeat",   value: "0" }
  when: pwquality_conf.stat.exists
  tags: [hardening_security, pam, pwquality]

#####################################
# 4.5 Expiração de senha (root / serverteam)
#####################################

- name: "4.5 - Set chage for root"
  ansible.builtin.command: "chage -m 1 -M 90 -d {{ ansible_date_time.date }} root"
  changed_when: false
  tags: [hardening_security, chage]

- name: "4.5 - Check if serverteam exists"
  ansible.builtin.command: getent passwd serverteam
  register: serverteam_check
  changed_when: false
  failed_when: false
  tags: [hardening_security, chage]

- name: "4.5 - Set chage for serverteam (if exists)"
  ansible.builtin.command: "chage -m 1 -M 90 -d {{ ansible_date_time.date }} serverteam"
  when: serverteam_check.rc == 0
  changed_when: false
  tags: [hardening_security, chage]

#####################################
# 4.6 Permissões em binários
#####################################

- name: "4.6 - Restrict /usr/bin/last"
  ansible.builtin.file:
    path: /usr/bin/last
    mode: "0700"
    owner: root
    group: root
  tags: [hardening_security, perms]

- name: "4.6 - Check if /usr/sbin/ifconfig exists"
  ansible.builtin.stat:
    path: /usr/sbin/ifconfig
  register: ifconfig_bin
  tags: [hardening_security, perms]

- name: "4.6 - Restrict /usr/sbin/ifconfig"
  ansible.builtin.file:
    path: /usr/sbin/ifconfig
    mode: "0700"
    owner: root
    group: root
  when: ifconfig_bin.stat.exists
  tags: [hardening_security, perms]

#####################################
# 4.7 Banner + MOTD
#####################################

- name: "4.7 - Deploy /etc/banner"
  ansible.builtin.template:
    src: banner.j2
    dest: /etc/banner
    owner: root
    group: root
    mode: "0644"
  register: banner_deploy
  tags: [hardening_security, banner]

- name: "4.7 - Ensure SSH Banner"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^\s*#?\s*Banner\b'
    line: "Banner /etc/banner"
    create: false
  register: ssh_banner
  tags: [hardening_security, banner, ssh]

- name: "4.7 - Deploy /etc/motd"
  ansible.builtin.template:
    src: motd.j2
    dest: /etc/motd
    owner: root
    group: root
    mode: "0644"
  tags: [hardening_security, banner]

- name: "4.7 - Validate sshd (banner) (only if changed)"
  ansible.builtin.command: sshd -t
  changed_when: false
  when: banner_deploy.changed or ssh_banner.changed
  tags: [hardening_security, banner, ssh]

- name: "4.7 - Restart sshd (banner) (only if changed)"
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when: banner_deploy.changed or ssh_banner.changed
  tags: [hardening_security, banner, ssh]

#####################################
# 4.8 Sysstat timer (every minute)
#####################################

- name: "4.8 - Check if sysstat-collect.timer exists"
  ansible.builtin.command: systemctl cat sysstat-collect.timer
  register: sysstat_timer_cat
  changed_when: false
  failed_when: false
  tags: [hardening_security, sysstat_timer]

- name: "4.8 - Ensure override dir"
  ansible.builtin.file:
    path: /etc/systemd/system/sysstat-collect.timer.d
    state: directory
    mode: "0755"
  when: sysstat_timer_cat.rc == 0
  tags: [hardening_security, sysstat_timer]

- name: "4.8 - Deploy sysstat timer override"
  ansible.builtin.template:
    src: sysstat-collect-override.conf.j2
    dest: /etc/systemd/system/sysstat-collect.timer.d/override.conf
    mode: "0644"
  register: sysstat_override
  when: sysstat_timer_cat.rc == 0
  tags: [hardening_security, sysstat_timer]

- name: "4.8 - Reload systemd"
  ansible.builtin.command: systemctl daemon-reload
  changed_when: false
  when: sysstat_timer_cat.rc == 0 and sysstat_override.changed
  tags: [hardening_security, sysstat_timer]

- name: "4.8 - Enable/start sysstat timer"
  ansible.builtin.systemd:
    name: sysstat-collect.timer
    enabled: true
    state: started
  when: sysstat_timer_cat.rc == 0
  tags: [hardening_security, sysstat_timer]

#####################################
# 4.9 UTMP / BTMP
#####################################

- name: "4.9 - Deploy tmpfiles var.conf"
  ansible.builtin.copy:
    src: var.conf
    dest: /etc/tmpfiles.d/var.conf
    mode: "0644"
  register: tmpfiles_conf
  tags: [hardening_security, tmpfiles]

- name: "4.9 - Apply tmpfiles"
  ansible.builtin.command: systemd-tmpfiles --create /etc/tmpfiles.d/var.conf
  changed_when: false
  when: tmpfiles_conf.changed
  tags: [hardening_security, tmpfiles]

- name: "4.9 - Enforce wtmp perms"
  ansible.builtin.file:
    path: /var/log/wtmp
    owner: root
    group: utmp
    mode: "0600"
  tags: [hardening_security, tmpfiles]

- name: "4.9 - Enforce btmp perms"
  ansible.builtin.file:
    path: /var/log/btmp
    owner: root
    group: utmp
    mode: "0600"
  tags: [hardening_security, tmpfiles]

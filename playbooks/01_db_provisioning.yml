---
- name: "Provisionamento Automático de Bancos de Dados"
  hosts: all
  become: yes

  tasks:
    - name: "Debug das variáveis do Survey"
      ansible.builtin.debug:
        msg: "O banco escolhido foi: {{ db_type }} para o host {{ inventory_hostname }}"

    - name: "Executar instalacao do Postgres"
      ansible.builtin.include_role:
        name: postgres_install
      when: db_type | lower == 'postgres'

    - name: "Executar gestao de usuarios do Postgres (opcional)"
      ansible.builtin.include_role:
        name: postgres_manage_users
      when:
        - db_type | lower == 'postgres'
        - postgres_manage_users_enabled | default(false) | bool

    - name: "Executar provisionamento do Oracle"
      ansible.builtin.include_role:
        name: oracle_install
      when: db_type | lower == 'oracle'

    - name: "Executar instalacao do MySQL"
      ansible.builtin.include_role:
        name: mysql_install
      when: db_type | lower == 'mysql'
---
# PostgreSQL Configuration Check & Auto-Remediation
# Runs 15 checks: kernel params, OS limits, PG memory settings, WAL/filesystem, backup, tablespace
# Auto-fixes all remediable items; generates HTML report at /tmp/postgres_config_check_<host>_<date>.html
#
# AWX survey vars (all optional -- defaults apply):
#   postgres_configuration_check_remediate: true   # false = check-only, no changes
#   postgres_configuration_check_allow_restart: true  # false = skip restart even if needed
#   postgres_generate_report: true
#
# Tags:
#   postgres_configuration_check   -- all checks
#   conf                           -- all conf tasks
#   conf_1 ... conf_15             -- individual checks

- name: "PostgreSQL Configuration Check & Security Audit"
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: "PRE | Verify PostgreSQL is running"
      ansible.builtin.service_facts:
      tags: always

    - name: "PRE | Abort if PostgreSQL service not found"
      ansible.builtin.fail:
        msg: >-
          PostgreSQL service not found or not running on {{ inventory_hostname }}.
          PostgreSQL must be installed before running configuration checks.
          Run deploy_postgres.yml first.
      when: >-
        ansible_facts.services | dict2items
        | selectattr('key', 'match', '(postgresql)(\\.service)?')
        | selectattr('value.state', 'equalto', 'running') | list | length == 0
      tags: always

  tasks:
    - name: "Phase 1 -- Configuration check and auto-remediation"
      ansible.builtin.include_role:
        name: postgres_configuration_check
      vars:
        postgres_generate_report: "{{ postgres_generate_report | default(true) | bool }}"
        postgres_configuration_check_remediate: "{{ postgres_configuration_check_remediate | default(true) | bool }}"
        postgres_configuration_check_allow_restart: "{{ postgres_configuration_check_allow_restart | default(true) | bool }}"
      tags: [postgres_configuration_check, conf]

    - name: "REPORT | Summary"
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════════════
           POSTGRES CHECK COMPLETE -- {{ inventory_hostname }}
          ════════════════════════════════════════════════════════════════
           Config check HTML : reports/postgres_config_check_{{ inventory_hostname }}_{{ ansible_date_time.date }}.html
          ════════════════════════════════════════════════════════════════
      tags: [postgres_configuration_check]

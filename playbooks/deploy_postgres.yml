---
- name: "Phase 0: Linux baseline"
  ansible.builtin.import_playbook: 00-guide.yml
  tags: [os_prep, bootstrap]

- name: "Deploy and harden PostgreSQL server"
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: "Phase 1: Install and harden PostgreSQL"
      ansible.builtin.include_role:
        name: postgres_install
      tags: [postgres, postgres_install, bootstrap]

- name: "Phase 2: PostgreSQL configuration check and auto-remediation"
  ansible.builtin.import_playbook: postgres_configuration_check.yml
  tags: [postgres_configuration_check]

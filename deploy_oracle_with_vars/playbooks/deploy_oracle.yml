---
- name: "Deploy and configure Oracle Database 19c"
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: "Phase 1-6: Install Oracle 19c (and create DB if create_initial_db=true)"
      ansible.builtin.include_role:
        name: oracle_install
      tags: [oracle, oracle_install]

    - name: "Phase 7: Configuration check and remediation (oracle_configuration_check)"
      ansible.builtin.include_role:
        name: oracle_configuration_check
      when:
        - create_initial_db | default(true) | bool
        - oracle_configuration_check_enabled | default(true) | bool
      vars:
        oracle_generate_report: true
        oracle_security_allow_restart: true   # always restart after deploy to activate SPFILE changes
      tags: [oracle, oracle_config_check, oracle_configuration_check, post_install]

    - name: "Phase 8: Optional user management"
      ansible.builtin.include_role:
        name: oracle_manage_users
      when:
        - oracle_manage_users_enabled | default(false) | bool
          or ('oracle_users' in (ansible_run_tags | default([])))
      tags: [oracle, oracle_users, post_install]

    - name: "Phase 9: Discover patches (no apply)"
      ansible.builtin.include_role:
        name: db_patches
      when:
        - db_patches_enabled | default(false) | bool
          or ('db_patches' in (ansible_run_tags | default([])))
      vars:
        db_patch_platform: "oracle"
      tags: [oracle, db_patches, patching]

    - name: "Phase 10: Security audit (oracle_security_check)"
      when:
        - create_initial_db | default(true) | bool
        - oracle_security_check_enabled | default(false) | bool
          or ('oracle_security' in (ansible_run_tags | default([])))
      tags: [oracle, oracle_security, post_install]
      vars:
        _sec_oracle_base: "/oracle/{{ oracle_sid }}"
        _sec_oracle_home: "{{ oracle_home | default(_sec_oracle_base + '/19.0.0') }}"
      block:
        - name: "Phase 10 | Verify sqlplus accessible"
          ansible.builtin.stat:
            path: "{{ _sec_oracle_home }}/bin/sqlplus"
          register: _sec_sqlplus_stat

        - name: "Phase 10 | Abort if sqlplus not found"
          ansible.builtin.fail:
            msg: >-
              sqlplus not found at {{ _sec_oracle_home }}/bin/sqlplus.
              Oracle must be installed before running the security check.
          when: not _sec_sqlplus_stat.stat.exists

        - name: "Phase 10 | Run oracle_security_check role"
          ansible.builtin.include_role:
            name: oracle_security_check

---
# Patch application order (matches oracle_install_guide.txt):
#   1. opatch post_patch1 (p38291812)
#   2. opatch post_patch2 (p38632161)
#   3. root: chown oracle oradism + chmod 0750
#   4. opatch post_patch3 (p34672698)
#   5. root: chown root oradism + chmod 4750

- name: "PATCHES | Free hugepages so OPatch JVM has sufficient RAM"
  ansible.builtin.shell: |
    cat /proc/sys/vm/nr_hugepages > /tmp/oracle_hugepages_saved
    echo 0 > /proc/sys/vm/nr_hugepages
  changed_when: false
  tags: oracle_patches

- name: "PATCHES | Clean stale OPatch staging from previous failed applies"
  ansible.builtin.shell: |
    rm -rf "{{ oracle_home }}/.patch_storage/oracle-home-"*
    rm -rf "{{ oracle_home }}/.patch_storage/unzip_action"
    exit 0
  become: true
  become_user: oracle
  changed_when: false
  tags: oracle_patches

- name: "PATCHES | Apply post_patch1 ({{ oracle_post_patch1_dir }})"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$PATH:{{ oracle_home }}/OPatch
    opatch lsinventory | grep -q "Patch  {{ oracle_post_patch1_sub }} " && exit 0
    test -d "{{ oracle_software_dst }}/{{ oracle_post_patch1_dir }}/{{ oracle_post_patch1_sub }}" || exit 0
    cd {{ oracle_software_dst }}/{{ oracle_post_patch1_dir }}/{{ oracle_post_patch1_sub }}
    opatch apply -silent
  become: true
  become_user: oracle
  register: patch1_result
  changed_when: "'OPatch succeeded' in patch1_result.stdout"
  when: oracle_post_patch1_enabled | bool
  tags: oracle_patches

- name: "PATCHES | Apply post_patch2 ({{ oracle_post_patch2_dir }})"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$PATH:{{ oracle_home }}/OPatch
    opatch lsinventory | grep -q "Patch  {{ oracle_post_patch2_sub }} " && exit 0
    test -d "{{ oracle_software_dst }}/{{ oracle_post_patch2_dir }}/{{ oracle_post_patch2_sub }}" || exit 0
    cd {{ oracle_software_dst }}/{{ oracle_post_patch2_dir }}/{{ oracle_post_patch2_sub }}
    opatch apply -silent
  become: true
  become_user: oracle
  register: patch2_result
  changed_when: "'OPatch succeeded' in patch2_result.stdout"
  tags: oracle_patches

- name: "PATCHES | Set oradism to oracle ownership before post_patch3 (as root)"
  ansible.builtin.shell: |
    owner=$(stat -c '%U' "{{ oracle_home }}/bin/oradism" 2>/dev/null)
    [ "$owner" = "oracle" ] && exit 0
    chown oracle "{{ oracle_home }}/bin/oradism"
    chmod 0750 "{{ oracle_home }}/bin/oradism"
  changed_when: false
  tags: oracle_patches

- name: "PATCHES | Apply post_patch3 ({{ oracle_post_patch3_dir }})"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$PATH:{{ oracle_home }}/OPatch
    opatch lsinventory | grep -q "Patch  {{ oracle_post_patch3_sub }} " && exit 0
    test -d "{{ oracle_software_dst }}/{{ oracle_post_patch3_dir }}/{{ oracle_post_patch3_sub }}" || exit 0
    cd {{ oracle_software_dst }}/{{ oracle_post_patch3_dir }}/{{ oracle_post_patch3_sub }}
    opatch apply -silent
  become: true
  become_user: oracle
  register: patch3_result
  changed_when: "'OPatch succeeded' in patch3_result.stdout"
  tags: oracle_patches

- name: "PATCHES | Restore oradism to root ownership (as root)"
  ansible.builtin.shell: |
    chown root "{{ oracle_home }}/bin/oradism"
    chmod 4750 "{{ oracle_home }}/bin/oradism"
  tags: oracle_patches

- name: "PATCHES | Restore hugepages after patching"
  ansible.builtin.shell: |
    saved=$(cat /tmp/oracle_hugepages_saved 2>/dev/null || echo 0)
    echo "$saved" > /proc/sys/vm/nr_hugepages
    rm -f /tmp/oracle_hugepages_saved
  changed_when: false
  tags: oracle_patches

- name: "PATCHES | Verify patch inventory"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$PATH:{{ oracle_home }}/OPatch
    opatch lsinventory
  become: true
  become_user: oracle
  register: opatch_inventory
  changed_when: false
  tags: oracle_patches

- name: "PATCHES | Show applied patches"
  ansible.builtin.debug:
    msg: "{{ opatch_inventory.stdout_lines | select('match', '.*Patch.*') | list }}"
  tags: oracle_patches

---
- name: "DBCREATE | Add Oracle to /etc/oratab"
  ansible.builtin.lineinfile:
    path: /etc/oratab
    line: "{{ oracle_sid }}:{{ oracle_home }}:Y"
    create: true
    owner: oracle
    group: oinstall
    mode: "0664"
  tags: oracle_dbcreate

- name: "DBCREATE | Run database creation script"
  ansible.builtin.shell: |
    test -f "{{ oracle_base }}/mirrlogA/cntrl/control01.ctl" && exit 0
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:{{ oracle_home }}/perl/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    {{ oracle_scripts_dir }}/{{ oracle_sid }}.sh
  become: true
  become_user: oracle
  register: dbcreate_result
  changed_when: dbcreate_result.rc == 0 and dbcreate_result.stdout | length > 0
  tags: oracle_dbcreate

- name: "DBCREATE | Show creation output summary"
  ansible.builtin.debug:
    msg: "{{ dbcreate_result.stdout_lines[-30:] }}"
  tags: oracle_dbcreate

- name: "DBCREATE | Start database if not running (uses creation pfile)"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    pgrep -f "ora_pmon_{{ oracle_sid }}" > /dev/null && exit 0
    echo "STARTUP PFILE={{ oracle_scripts_dir }}/init.ora;" | sqlplus -s / as sysdba
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_dbcreate

- name: "DBCREATE | Verify database is open"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    sqlplus -s / as sysdba <<EOF
    SELECT status FROM v\$instance;
    EXIT;
    EOF
  become: true
  become_user: oracle
  register: db_status
  changed_when: false
  tags: oracle_dbcreate

- name: "DBCREATE | Assert database is OPEN"
  ansible.builtin.assert:
    that: "'OPEN' in db_status.stdout"
    fail_msg: "Database did not reach OPEN status. Check {{ oracle_scripts_dir }}/CreateDB.log"
  tags: oracle_dbcreate

- name: "DBCREATE | Create SPFILE from pfile and restart"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    # Idempotency: skip only if Oracle is ALREADY running with SPFILE (not just if file exists)
    SPFILE_VAL=$(echo "SELECT VALUE FROM v\$parameter WHERE name='spfile';" | sqlplus -s / as sysdba 2>/dev/null)
    echo "$SPFILE_VAL" | grep -qi "spfile" && exit 0
    # Create or replace SPFILE, then restart so Oracle loads it
    sqlplus -s / as sysdba <<EOF
    CREATE OR REPLACE SPFILE='{{ oracle_home }}/dbs/spfile{{ oracle_sid }}.ora' FROM PFILE='{{ oracle_scripts_dir }}/init.ora';
    SHUTDOWN IMMEDIATE;
    STARTUP;
    EXIT;
    EOF
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_dbcreate

- name: "DBCREATE | Verify SPFILE is in use"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    sqlplus -s / as sysdba <<EOF
    SELECT VALUE FROM v\$parameter WHERE name = 'spfile';
    EXIT;
    EOF
  become: true
  become_user: oracle
  register: spfile_check
  changed_when: false
  tags: oracle_dbcreate

- name: "DBCREATE | Assert SPFILE is active"
  ansible.builtin.fail:
    msg: "SPFILE not active — spfile{{ oracle_sid | lower }}.ora not found in v$parameter"
  when: spfile_check.stdout is not search('spfile', ignorecase=True)
  tags: oracle_dbcreate

- name: "DBCREATE | Apply Users_and_Objects profile settings"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    sqlplus -s "/ as sysdba" @{{ oracle_scripts_dir }}/Users_and_Objects.sql < /dev/null
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_dbcreate

# ---------------------------------------------------------------------------
# Post-install verification — listener + summary
# Runs at end of Phase 6 so a single job gives full confirmation of success.
# ---------------------------------------------------------------------------

- name: "DBCREATE | Start listener (lsnrctl start)"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH={{ oracle_home }}/bin:$PATH
    lsnrctl status LISTENER > /dev/null 2>&1 && exit 0
    lsnrctl start LISTENER
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_dbcreate

- name: "DBCREATE | Verify listener is running"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export PATH={{ oracle_home }}/bin:$PATH
    lsnrctl status LISTENER
  become: true
  become_user: oracle
  register: listener_status
  changed_when: false
  failed_when: "'TNS-12541' in listener_status.stdout or listener_status.rc not in [0]"
  tags: oracle_dbcreate

- name: "DBCREATE | Collect final DB facts for summary"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    export LD_LIBRARY_PATH={{ oracle_home }}/lib:/lib:/usr/lib
    sqlplus -s / as sysdba <<'EOF'
    SET PAGESIZE 0 FEEDBACK OFF VERIFY OFF HEADING OFF
    SELECT 'DB_NAME='      || name             FROM v$database;
    SELECT 'DB_STATUS='    || status           FROM v$instance;
    SELECT 'DB_VERSION='   || version          FROM v$instance;
    SELECT 'CHARSET='      || value            FROM nls_database_parameters WHERE parameter='NLS_CHARACTERSET';
    SELECT 'SGA_TARGET='   || value            FROM v$parameter WHERE name='sga_target';
    SELECT 'PGA_TARGET='   || value            FROM v$parameter WHERE name='pga_aggregate_target';
    SELECT 'SPFILE='       || value            FROM v$parameter WHERE name='spfile';
    SELECT 'OPEN_MODE='    || open_mode        FROM v$database;
    EXIT;
    EOF
  become: true
  become_user: oracle
  register: db_facts
  changed_when: false
  tags: oracle_dbcreate

- name: "DBCREATE | Collect mounted LVs"
  ansible.builtin.shell: df -h | grep "oracle"
  register: oracle_mounts
  changed_when: false
  tags: oracle_dbcreate

- name: "DBCREATE | Collect oratab entry"
  ansible.builtin.shell: grep "^{{ oracle_sid }}:" /etc/oratab
  register: oratab_entry
  changed_when: false
  tags: oracle_dbcreate

- name: "DBCREATE | === INSTALLATION COMPLETE — SUMMARY ==="
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════════════════
       ORACLE 19c INSTALLATION COMPLETE
      ════════════════════════════════════════════════════════
       TARGET HOST  : {{ inventory_hostname }} ({{ ansible_host }})
       ORACLE_HOME  : {{ oracle_home }}
      ────────────────────────────────────────────────────────
       DATABASE FACTS:
      {% for line in db_facts.stdout_lines %}
      {% if line | trim | length > 0 %}
         {{ line | trim }}
      {% endif %}
      {% endfor %}
      ────────────────────────────────────────────────────────
       ORATAB       : {{ oratab_entry.stdout | trim }}
      ────────────────────────────────────────────────────────
       LISTENER     : {{ 'OK (rc=0)' if listener_status.rc == 0 else 'ERROR — rc=' + listener_status.rc | string }}
      ────────────────────────────────────────────────────────
       MOUNTED LVs:
      {{ oracle_mounts.stdout }}
      ════════════════════════════════════════════════════════
  tags: oracle_dbcreate

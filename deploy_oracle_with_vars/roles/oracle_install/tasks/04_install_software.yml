---
- name: "INSTALL | Detect corrupted Oracle home (0-byte or invalid .a libs from interrupted patch)"
  ansible.builtin.shell: |
    # Only meaningful if oracle was actually installed (oraInventory exists)
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" || exit 0
    find "{{ oracle_home }}/lib" -name "*.a" -empty 2>/dev/null | grep -q . && echo corrupt && exit 0
    # Capture both exit code and stderr — ar t may return 0 but print "not a valid archive"
    ar_out=$(/usr/bin/ar t "{{ oracle_home }}/lib/libserver19.a" 2>&1)
    if [ $? -ne 0 ] || echo "$ar_out" | grep -qi "not a valid archive"; then
      echo corrupt
      exit 0
    fi
    echo ok
  register: _ohome_corrupt
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Wipe corrupted Oracle home to force full reinstall"
  ansible.builtin.shell: |
    rm -rf "{{ oracle_home }}"
    rm -rf "{{ oracle_base }}/oraInventory"
    mkdir -p "{{ oracle_home }}"
    chown oracle:oinstall "{{ oracle_home }}"
    chmod 0750 "{{ oracle_home }}"
  when: _ohome_corrupt.stdout == "corrupt"
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Detect RU p37642901 in oracle home (applied via -applyRU, incompatible with post-install patches)"
  ansible.builtin.shell: |
    # If oraInventory missing, runInstaller hasn't run — nothing to check
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" || exit 0
    export ORACLE_HOME={{ oracle_home }}
    export PATH=$PATH:{{ oracle_home }}/OPatch
    {{ oracle_home }}/OPatch/opatch lsinventory 2>/dev/null | grep -q "Patch  37642901 " && echo has_ru || echo no_ru
  become: true
  become_user: oracle
  register: _ru_check
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Wipe oracle home — RU p37642901 present, incompatible with post-install patches"
  ansible.builtin.shell: |
    rm -rf "{{ oracle_home }}"
    rm -rf "{{ oracle_base }}/oraInventory"
    mkdir -p "{{ oracle_home }}"
    chown oracle:oinstall "{{ oracle_home }}"
    chmod 0750 "{{ oracle_home }}"
  when: _ru_check.stdout == "has_ru"
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Wipe Oracle home if installation never completed"
  ansible.builtin.shell: |
    # Properly installed = oraInventory exists with oracle home registered
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" && exit 0
    # Not installed — clean up any partial state
    rm -rf "{{ oracle_home }}"
    rm -rf "{{ oracle_base }}/oraInventory"
    mkdir -p "{{ oracle_home }}"
    chown oracle:oinstall "{{ oracle_home }}"
    chmod 0750 "{{ oracle_home }}"
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Unzip Oracle installer into ORACLE_HOME"
  ansible.builtin.shell: |
    # Skip if already installed
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" && exit 0
    # Skip if already unzipped (runInstaller present)
    test -f "{{ oracle_home }}/runInstaller" && exit 0
    cd "{{ oracle_home }}"
    unzip -oq "{{ oracle_software_dst }}/{{ oracle_installer_zip }}"
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Back up bundled OPatch"
  ansible.builtin.shell: |
    # Skip if oracle already properly installed
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" && echo skip_installed && exit 0
    test -d "{{ oracle_home }}/OPatchOLD" && echo skip_already_backed && exit 0
    cd "{{ oracle_home }}"
    mv OPatch OPatchOLD
    echo backed_up
  become: true
  become_user: oracle
  register: _opatch_backup
  changed_when: "'backed_up' in _opatch_backup.stdout"
  tags: oracle_install_sw

- name: "INSTALL | Install new OPatch"
  ansible.builtin.shell: |
    # Skip if oracle already properly installed
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" && echo skip_installed && exit 0
    test -d "{{ oracle_home }}/OPatchOLD" && test -d "{{ oracle_home }}/OPatch" && echo skip_already_installed && exit 0
    cd "{{ oracle_home }}"
    cp -r "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}/OPatch" .
    echo installed
  become: true
  become_user: oracle
  register: _opatch_install
  changed_when: "'installed' in _opatch_install.stdout"
  tags: oracle_install_sw

- name: "INSTALL | Run silent Oracle software installation"
  ansible.builtin.shell: |
    # Skip if oracle already properly installed (oraInventory proves runInstaller ran)
    test -f "{{ oracle_base }}/oraInventory/ContentsXML/comps.xml" && exit 0
    export CV_ASSUME_DISTID=RHEL8
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_HOSTNAME=$(hostname)
    cd "{{ oracle_home }}"
    ./runInstaller \
      -silent \
      -responseFile {{ oracle_home }}/install/response/db_install.rsp \
      -ignorePrereq \
      -waitforcompletion \
      oracle.install.option=INSTALL_DB_SWONLY \
      ORACLE_HOSTNAME=${ORACLE_HOSTNAME} \
      UNIX_GROUP_NAME=oinstall \
      INVENTORY_LOCATION={{ oracle_base }}/oraInventory \
      SELECTED_LANGUAGES=en \
      ORACLE_HOME={{ oracle_home }} \
      ORACLE_BASE={{ oracle_base }} \
      oracle.install.db.InstallEdition=EE \
      oracle.install.db.OSDBA_GROUP=dba \
      oracle.install.db.OSBACKUPDBA_GROUP=dba \
      oracle.install.db.OSDGDBA_GROUP=dba \
      oracle.install.db.OSKMDBA_GROUP=kmdba \
      oracle.install.db.OSRACDBA_GROUP=dba \
      SECURITY_UPDATES_VIA_MYORACLESUPPORT=false \
      DECLINE_SECURITY_UPDATES=true
  become: true
  become_user: oracle
  register: oracle_installer_result
  failed_when:
    - oracle_installer_result.rc is defined
    - oracle_installer_result.rc not in [0, 6]
    - "'Successfully Setup Software' not in oracle_installer_result.stdout"
  changed_when: "'Successfully Setup Software' in oracle_installer_result.stdout"
  tags: oracle_install_sw

- name: "INSTALL | Run root.sh (required post-install step)"
  ansible.builtin.shell: |
    grep -q "{{ oracle_home }}" /etc/oratab 2>/dev/null && exit 0
    "{{ oracle_home }}/root.sh"
  changed_when: false
  tags: oracle_install_sw

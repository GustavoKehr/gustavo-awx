---
- name: "INSTALL | Detect corrupted Oracle home (0-byte .a library files from interrupted patch)"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" || exit 0
    find "{{ oracle_home }}/lib" -name "*.a" -empty 2>/dev/null | grep -q . && echo corrupt || echo ok
  register: _ohome_corrupt
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Wipe corrupted Oracle home to force full reinstall"
  ansible.builtin.shell: |
    rm -rf "{{ oracle_home }}"
    mkdir -p "{{ oracle_home }}"
    chown oracle:oinstall "{{ oracle_home }}"
    chmod 0750 "{{ oracle_home }}"
  when: _ohome_corrupt.stdout == "corrupt"
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Wipe Oracle home if installation never completed"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    rm -rf "{{ oracle_home }}"
    mkdir -p "{{ oracle_home }}"
    chown oracle:oinstall "{{ oracle_home }}"
    chmod 0750 "{{ oracle_home }}"
  changed_when: false
  tags: oracle_install_sw

- name: "INSTALL | Unzip Oracle installer into ORACLE_HOME"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    test -f "{{ oracle_home }}/runInstaller" && exit 0
    cd "{{ oracle_home }}"
    unzip -oq "{{ oracle_software_dst }}/{{ oracle_installer_zip }}"
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Back up bundled OPatch"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    test -d "{{ oracle_home }}/OPatchOLD" && exit 0
    cd "{{ oracle_home }}"
    mv OPatch OPatchOLD
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Install new OPatch"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    test -d "{{ oracle_home }}/OPatchOLD" && test -d "{{ oracle_home }}/OPatch" && exit 0
    cd "{{ oracle_home }}"
    cp -r "{{ oracle_software_dst }}/{{ oracle_opatch_dir }}/OPatch" .
  become: true
  become_user: oracle
  changed_when: true
  tags: oracle_install_sw

- name: "INSTALL | Run silent Oracle software installation"
  ansible.builtin.shell: |
    test -s "{{ oracle_home }}/bin/oracle" && exit 0
    export CV_ASSUME_DISTID=RHEL8
    export ORACLE_BASE={{ oracle_base }}
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_HOSTNAME=$(hostname)
    cd "{{ oracle_home }}"
    # Build optional one-off argument (empty oracle_oneoff_subpath = skip -applyOneOffs)
    ONEOFF_ARG=""
    if [ -n "{{ oracle_oneoff_subpath }}" ]; then
      ONEOFF_ARG="-applyOneOffs {{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/{{ oracle_oneoff_subpath }}"
    fi
    ./runInstaller \
      -applyRU {{ oracle_software_dst }}/{{ oracle_ru_patch_dir }}/{{ oracle_ru_subpath }} \
      $ONEOFF_ARG \
      -silent \
      -responseFile {{ oracle_home }}/install/response/db_install.rsp \
      -ignorePrereq \
      -waitforcompletion \
      oracle.install.option=INSTALL_DB_SWONLY \
      ORACLE_HOSTNAME=${ORACLE_HOSTNAME} \
      UNIX_GROUP_NAME=oinstall \
      INVENTORY_LOCATION={{ oracle_base }}/oraInventory \
      SELECTED_LANGUAGES=en \
      ORACLE_HOME={{ oracle_home }} \
      ORACLE_BASE={{ oracle_base }} \
      oracle.install.db.InstallEdition=EE \
      oracle.install.db.OSDBA_GROUP=dba \
      oracle.install.db.OSBACKUPDBA_GROUP=dba \
      oracle.install.db.OSDGDBA_GROUP=dba \
      oracle.install.db.OSKMDBA_GROUP=kmdba \
      oracle.install.db.OSRACDBA_GROUP=dba \
      SECURITY_UPDATES_VIA_MYORACLESUPPORT=false \
      DECLINE_SECURITY_UPDATES=true
  become: true
  become_user: oracle
  register: oracle_installer_result
  failed_when:
    - oracle_installer_result.rc is defined
    - oracle_installer_result.rc not in [0, 6]
    - "'Successfully Setup Software' not in oracle_installer_result.stdout"
  changed_when: "'Successfully Setup Software' in oracle_installer_result.stdout"
  tags: oracle_install_sw

- name: "INSTALL | Run root.sh (required post-install step)"
  ansible.builtin.shell: |
    grep -q "{{ oracle_home }}" /etc/oratab 2>/dev/null && exit 0
    "{{ oracle_home }}/root.sh"
  changed_when: false
  tags: oracle_install_sw
